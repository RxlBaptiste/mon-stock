<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#1e3a8a" />
    <title>Mon Stockage Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        touch-action: manipulation;
        font-family: sans-serif;
        -webkit-tap-highlight-color: transparent;
        background-color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const API_PRO_URL = "https://baptisterouxel.fr/stock/stock_pro_api.php";
      const PASS_PRO = "1234"; // change-le après

      const AppPro = () => {
        const [isUnlocked, setIsUnlocked] = React.useState(false);
        const [produits, setProduits] = React.useState([]);
        const [showAddModal, setShowAddModal] = React.useState(false);

        const [form, setForm] = React.useState({
          nom: "",
          categorie: "Autres",
          unite: "kg",
          quantite_initiale: "",
          quantite_restante: "",
          seuil_alerte: "",
          prix_total_achat: "",
          fournisseur: "",
          date_achat: "",
          date_peremption: "",
          note: "",
        });

        React.useEffect(() => {
          if (isUnlocked) {
            fetch(`${API_PRO_URL}?action=get_stock_pro`)
              .then((res) => res.json())
              .then((data) => setProduits(Array.isArray(data) ? data : []))
              .catch(() => setProduits([]));
          }
        }, [isUnlocked]);

        const calculPrixUnitaire = (prixTotal, quantiteInitiale) => {
          const prix = Number(prixTotal);
          const qte = Number(quantiteInitiale);

          if (!prix || !qte) return 0;
          return +(prix / qte).toFixed(4);
        };

        const saveProductPro = async (product) => {
          await fetch(`${API_PRO_URL}?action=save_product_pro`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(product),
          });
        };

        const handleAddProduct = async () => {
          const prixUnitaire = calculPrixUnitaire(
            form.prix_total_achat,
            form.quantite_initiale,
          );

          const newProduct = {
            id: Date.now(),
            nom: form.nom.toUpperCase(),
            categorie: form.categorie,
            unite: form.unite,
            quantite_initiale: Number(form.quantite_initiale || 0),
            quantite_restante: Number(form.quantite_restante || 0),
            seuil_alerte: Number(form.seuil_alerte || 0),
            prix_total_achat: Number(form.prix_total_achat || 0),
            prix_unitaire: prixUnitaire,
            fournisseur: form.fournisseur,
            date_achat: form.date_achat || null,
            date_peremption: form.date_peremption || null,
            note: form.note,
          };

          await saveProductPro(newProduct);
          setProduits((prev) => [newProduct, ...prev]);
          setShowAddModal(false);

          setForm({
            nom: "",
            categorie: "Autres",
            unite: "kg",
            quantite_initiale: "",
            quantite_restante: "",
            seuil_alerte: "",
            prix_total_achat: "",
            fournisseur: "",
            date_achat: "",
            date_peremption: "",
            note: "",
          });
        };

        const updateQuantity = async (id, delta) => {
          const updated = produits.map((p) => {
            if (p.id !== id) return p;

            const nextQty = Math.max(0, Number(p.quantite_restante) + delta);
            const updatedProduct = { ...p, quantite_restante: nextQty };
            saveProductPro(updatedProduct);
            return updatedProduct;
          });

          setProduits(updated);
        };

        const getAchatConseille = (p) => {
          const manque = Number(p.seuil_alerte) - Number(p.quantite_restante);
          if (manque <= 0) return null;

          const cout = +(manque * Number(p.prix_unitaire || 0)).toFixed(2);

          return {
            quantite: manque,
            cout,
          };
        };

        if (!isUnlocked) {
          return (
            <div className="min-h-screen bg-slate-800 flex items-center justify-center p-6">
              <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
                <h1 className="text-center font-black uppercase mb-6 text-slate-700">
                  Mode Pro
                </h1>
                <form
                  onSubmit={(e) => {
                    e.preventDefault();
                    const code = e.target.code.value;
                    if (code === PASS_PRO) {
                      setIsUnlocked(true);
                    } else {
                      alert("Code incorrect");
                    }
                  }}
                  className="space-y-4"
                >
                  <input
                    name="code"
                    type="password"
                    placeholder="Code d'accès"
                    className="w-full p-4 rounded-2xl bg-gray-100 outline-none"
                  />
                  <button className="w-full bg-slate-800 text-white p-4 rounded-2xl font-black uppercase">
                    Entrer
                  </button>
                </form>
              </div>
            </div>
          );
        }

        return (
          <div className="max-w-md mx-auto min-h-screen pb-24 bg-gray-100">
            <header className="bg-slate-800 text-white p-5 sticky top-0 z-20 shadow">
              <div className="flex justify-between items-center">
                <div>
                  <h1 className="font-black uppercase text-lg">
                    Mon Stockage Pro
                  </h1>
                  <p className="text-[10px] uppercase text-slate-300">
                    Mode professionnel
                  </p>
                </div>
                <button
                  onClick={() => setShowAddModal(true)}
                  className="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase"
                >
                  + Produit
                </button>
              </div>
            </header>

            <main className="p-4 space-y-3">
              {produits.length === 0 ? (
                <div className="bg-white rounded-3xl p-8 text-center text-gray-400 font-bold">
                  Aucun produit pro
                </div>
              ) : (
                produits.map((p) => {
                  const achat = getAchatConseille(p);

                  return (
                    <div
                      key={p.id}
                      className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100"
                    >
                      <div className="flex justify-between items-start gap-3">
                        <div>
                          <h2 className="font-black uppercase text-sm text-slate-800">
                            {p.nom}
                          </h2>
                          <p className="text-[10px] uppercase text-gray-400">
                            {p.categorie}
                          </p>
                        </div>
                        <div className="text-right">
                          <div className="text-[10px] uppercase text-blue-600 font-black">
                            {p.unite}
                          </div>
                          <div className="text-[10px] text-gray-400">
                            {Number(p.prix_unitaire).toFixed(2)} / {p.unite}
                          </div>
                        </div>
                      </div>

                      <div className="mt-4 grid grid-cols-2 gap-3 text-xs">
                        <div className="bg-gray-50 rounded-2xl p-3">
                          <div className="text-gray-400 uppercase font-black text-[9px]">
                            Initial
                          </div>
                          <div className="font-black text-slate-700">
                            {p.quantite_initiale} {p.unite}
                          </div>
                        </div>

                        <div className="bg-gray-50 rounded-2xl p-3">
                          <div className="text-gray-400 uppercase font-black text-[9px]">
                            Restant
                          </div>
                          <div className="font-black text-slate-700">
                            {p.quantite_restante} {p.unite}
                          </div>
                        </div>

                        <div className="bg-gray-50 rounded-2xl p-3">
                          <div className="text-gray-400 uppercase font-black text-[9px]">
                            Seuil
                          </div>
                          <div className="font-black text-slate-700">
                            {p.seuil_alerte} {p.unite}
                          </div>
                        </div>

                        <div className="bg-gray-50 rounded-2xl p-3">
                          <div className="text-gray-400 uppercase font-black text-[9px]">
                            Achat
                          </div>
                          <div className="font-black text-slate-700">
                            {Number(p.prix_total_achat).toFixed(2)} €
                          </div>
                        </div>
                      </div>

                      {achat && (
                        <div className="mt-3 bg-orange-50 border border-orange-100 rounded-2xl p-3">
                          <div className="text-[9px] font-black uppercase text-orange-500">
                            À racheter
                          </div>
                          <div className="text-sm font-black text-orange-700">
                            {achat.quantite.toFixed(2)} {p.unite} ≈{" "}
                            {achat.cout.toFixed(2)} €
                          </div>
                        </div>
                      )}

                      <div className="mt-4 flex gap-2">
                        <button
                          onClick={() => updateQuantity(p.id, -1)}
                          className="flex-1 bg-white border border-gray-200 rounded-xl p-3 font-black"
                        >
                          -1
                        </button>
                        <button
                          onClick={() => updateQuantity(p.id, -0.5)}
                          className="flex-1 bg-white border border-gray-200 rounded-xl p-3 font-black"
                        >
                          -0.5
                        </button>
                        <button
                          onClick={() => updateQuantity(p.id, +1)}
                          className="flex-1 bg-blue-600 text-white rounded-xl p-3 font-black"
                        >
                          +1
                        </button>
                      </div>
                    </div>
                  );
                })
              )}
            </main>

            {showAddModal && (
              <div className="fixed inset-0 bg-black/50 flex items-end p-4 z-50">
                <div className="bg-white w-full max-w-md mx-auto rounded-[2rem] p-6 space-y-3">
                  <h2 className="text-center font-black uppercase text-slate-700">
                    Nouveau produit pro
                  </h2>

                  <input
                    type="text"
                    placeholder="Nom"
                    value={form.nom}
                    onChange={(e) => setForm({ ...form, nom: e.target.value })}
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <input
                    type="text"
                    placeholder="Catégorie"
                    value={form.categorie}
                    onChange={(e) =>
                      setForm({ ...form, categorie: e.target.value })
                    }
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <select
                    value={form.unite}
                    onChange={(e) =>
                      setForm({ ...form, unite: e.target.value })
                    }
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  >
                    <option value="unite">unité</option>
                    <option value="g">g</option>
                    <option value="kg">kg</option>
                    <option value="ml">ml</option>
                    <option value="l">l</option>
                    <option value="%">%</option>
                  </select>

                  <input
                    type="number"
                    step="0.01"
                    placeholder="Quantité initiale"
                    value={form.quantite_initiale}
                    onChange={(e) =>
                      setForm({ ...form, quantite_initiale: e.target.value })
                    }
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <input
                    type="number"
                    step="0.01"
                    placeholder="Quantité restante"
                    value={form.quantite_restante}
                    onChange={(e) =>
                      setForm({ ...form, quantite_restante: e.target.value })
                    }
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <input
                    type="number"
                    step="0.01"
                    placeholder="Seuil d'alerte"
                    value={form.seuil_alerte}
                    onChange={(e) =>
                      setForm({ ...form, seuil_alerte: e.target.value })
                    }
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <input
                    type="number"
                    step="0.01"
                    placeholder="Prix total achat (€)"
                    value={form.prix_total_achat}
                    onChange={(e) =>
                      setForm({ ...form, prix_total_achat: e.target.value })
                    }
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <input
                    type="text"
                    placeholder="Fournisseur"
                    value={form.fournisseur}
                    onChange={(e) =>
                      setForm({ ...form, fournisseur: e.target.value })
                    }
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <input
                    type="date"
                    placeholder="Date d'achat"
                    value={form.date_achat}
                    onChange={(e) =>
                      setForm({ ...form, date_achat: e.target.value })
                    }
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <input
                    type="date"
                    placeholder="Date de péremption"
                    value={form.date_peremption}
                    onChange={(e) =>
                      setForm({ ...form, date_peremption: e.target.value })
                    }
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <textarea
                    placeholder="Note"
                    value={form.note}
                    onChange={(e) => setForm({ ...form, note: e.target.value })}
                    className="w-full p-3 rounded-xl bg-gray-100 outline-none"
                  />

                  <div className="flex gap-2 pt-2">
                    <button
                      onClick={() => setShowAddModal(false)}
                      className="flex-1 p-3 rounded-xl bg-gray-200 font-black uppercase"
                    >
                      Annuler
                    </button>
                    <button
                      onClick={handleAddProduct}
                      className="flex-1 p-3 rounded-xl bg-blue-600 text-white font-black uppercase"
                    >
                      Enregistrer
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<AppPro />);
    </script>
  </body>
</html>
