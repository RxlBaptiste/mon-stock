<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#22c55e">
    <title>Mon Stockage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { touch-action: manipulation; font-family: sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-orange { 0%, 100% { background-color: #fff; } 50% { background-color: #fff7ed; } }
        .warning-dlc { animation: pulse-orange 2s infinite; border-left: 5px solid #fb923c !important; }
        .frozen-style { border-left: 5px solid #3b82f6 !important; background-color: #eff6ff; }
        .animate-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = "https://baptisterouxel.fr/stock/api.php";
        const { useState, useEffect, useRef } = React;
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

        const STRUCTURE = {
            Alimentaire: { icon: "🧺", rayons: [
                { id: "Fruits et Légumes", icon: "🍎" }, { id: "Viande", icon: "🥩" }, { id: "Poisson", icon: "🐟" },
                { id: "Produits Laitiers", icon: "🥛" }, { id: "Salé", icon: "🧂" }, { id: "Sucré", icon: "🍪" },
                { id: "Condiments", icon: "🍯" }, { id: "Boissons", icon: "🍷" }, { id: "Surgelés", icon: "❄️" }, { id: "Boulangerie", icon: "🥖" }
            ]},
            Hygiène: { icon: "✨", rayons: [
                { id: "Hygiène Corporelle", icon: "🧼" }, { id: "Hygiène Dentaire", icon: "🪥" },
                { id: "Produits Ménagers", icon: "🧹" }, { id: "Papier", icon: "🧻" }, { id: "Lessive", icon: "🧺" }
            ]},
            Divers: { icon: "📦", rayons: [
                { id: "Pharmacie", icon: "🩹" }, { id: "Animaux", icon: "🐾" }, { id: "Bricolage", icon: "🛠️" }, { id: "Autres", icon: "🌀" }
            ]}
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem("stock_session") === "active");
            const [produits, setProduits] = useState([]);
            const [view, setView] = useState("home");
            const [loading, setLoading] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState({ show: false, produit: null });
            const [searchTerm, setSearchTerm] = useState("");
            const [openSections, setOpenSections] = useState({});
            const [form, setForm] = useState({ nom: "", zone: "Alimentaire", rayon: "Fruits et Légumes", typeStock: "unite", stock: 1, date: "", congele: false });
            const [receiptItems, setReceiptItems] = useState([]);
            const currentUser = localStorage.getItem("stock_user") || "baptiste";

            useEffect(() => { if (isLoggedIn) refreshStock(); }, [isLoggedIn, currentUser]);

            const refreshStock = () => {
                fetch(`${API_URL}?action=get_stock&user=${currentUser}`)
                    .then(res => res.json())
                    .then(data => setProduits(Array.isArray(data) ? data : []))
                    .catch(() => setProduits([]));
            };

            const syncWithServer = async (p) => {
                try { await fetch(`${API_URL}?action=save_product&user=${currentUser}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(p) }); }
                catch (err) { console.error(err); }
            };

            const scanTicket = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setReceiptItems([]);
                try {
                    let source = "";
                    if (file.type === "application/pdf") {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        const page = await pdf.getPage(1);
                        const canvas = document.createElement("canvas");
                        const viewport = page.getViewport({ scale: 2.5 });
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
                        source = canvas.toDataURL("image/png");
                    } else { source = URL.createObjectURL(file); }

                    const worker = await Tesseract.createWorker("fra");
                    const { data: { text } } = await worker.recognize(source);
                    const lignes = text.split("\n").map(l => l.trim().toUpperCase());
                    const res = [];
                    
                    const isHyperU = text.includes("VENTE");

                    if (isHyperU) {
                        // --- LOGIQUE HYPER U ---
                        let start = lignes.findIndex(l => l.includes("VENTE"));
                        let end = lignes.findIndex(l => l.includes("NOMBRE DE LIGNES"));
                        if (end === -1) end = lignes.length;

                        for (let i = start + 1; i < end; i++) {
                            let l = lignes[i];
                            const regexPrix = /(\d+[\.,]\d{2})\s*(?:€|EUR|E)?$/;
                            if (regexPrix.test(l)) {
                                // On remonte pour trouver le nom en ignorant les lignes de poids
                                for (let j = 1; j <= 6; j++) {
                                    let nomC = lignes[i - j];
                                    if (!nomC || nomC.length < 3) continue;
                                    if (!nomC.match(regexPrix) && !nomC.includes("PESÉE") && !nomC.includes("KG") && !nomC.includes("---")) {
                                        let cleanName = nomC.replace(/[*_]/g, "").split(',')[0].trim();
                                        if (cleanName.length > 2 && !cleanName.includes("MONTANT")) {
                                            res.push({ nom: cleanName, qte: 1, dlc: "", congele: false, zone: "Alimentaire", rayon: "Fruits et Légumes", typeStock: "unite" });
                                        }
                                        break;
                                    }
                                }
                            }
                        }
                    } else {
                        // --- LOGIQUE LECLERC ---
                        // Début après le symbole € isolé, fin à TOTAL
                        let start = lignes.findIndex(l => l === "€" || l === "EUR");
                        let end = lignes.findIndex(l => l.startsWith("TOTAL"));
                        if (end === -1) end = lignes.length;

                        for (let i = start + 1; i < end; i++) {
                            let l = lignes[i];
                            // Ignorer les très longs nombres (code barres OCR mal lu)
                            if (l.replace(/\s/g, "").length > 15 && /^\d+$/.test(l.replace(/\s/g, ""))) continue;

                            const regexPrix = /(\d+[\.,]\d{2})$/;
                            const regexMultiLeclerc = /^(\d+)\s*[X]\s*[\d,.]+€?$/; // Détecte "2 X 0.85€"

                            if (l.match(regexMultiLeclerc)) {
                                const qte = parseInt(l.match(regexMultiLeclerc)[1]);
                                if (res.length > 0) res[res.length - 1].qte = qte;
                            } else if (regexPrix.test(l)) {
                                let name = l.replace(regexPrix, "").replace(/[*_]/g, "").trim();
                                // Si le nom est sur la ligne d'avant (car prix décalé)
                                if (name.length < 3) name = lignes[i-1].replace(/[*_]/g, "").trim();
                                
                                if (name.length > 2 && !name.includes("TOTAL") && !name.includes("ARTICLES")) {
                                    res.push({ nom: name, qte: 1, dlc: "", congele: false, zone: "Alimentaire", rayon: "Boulangerie", typeStock: "unite" });
                                }
                            }
                        }
                    }

                    setReceiptItems(res); await worker.terminate();
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            const toggleFreeze = (p) => {
                const updated = { ...p, congele: p.congele == 1 ? 0 : 1 };
                setProduits(produits.map(item => item.id === p.id ? updated : item));
                syncWithServer(updated);
            };

            const updateStock = (id, delta) => {
                const newP = produits.map(p => {
                    if (p.id !== id) return p;
                    let step = p.typeStock === "pourcent" ? 25 : 1;
                    let next = Number(p.stock) + (delta * step);
                    if (next <= 0 && delta < 0) { setConfirmDelete({ show: true, produit: p }); return p; }
                    const u = { ...p, stock: Math.max(0, p.typeStock === "pourcent" ? Math.min(100, next) : next) };
                    syncWithServer(u); return u;
                });
                setProduits(newP);
            };

            if (!isLoggedIn) return (
                <div className="fixed inset-0 bg-green-600 flex items-center justify-center p-6 text-center">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl animate-up">
                        <form onSubmit={(e) => { 
                            e.preventDefault(); 
                            const pass = e.target.p.value; 
                            const users = { "CeciEstMonMotDePasseStock_22": "baptiste", "1912": "soeur", "5678": "pere" }; 
                            if (users[pass]) { localStorage.setItem("stock_user", users[pass]); localStorage.setItem("stock_session", "active"); setIsLoggedIn(true); }
                        }} className="space-y-4">
                            <h2 className="font-black uppercase text-gray-800 italic">Mon Stockage</h2>
                            <input name="p" type="password" inputMode="numeric" placeholder="Code..." className="w-full p-5 bg-gray-50 rounded-2xl border-2 text-center text-xl focus:border-green-500 outline-none" />
                            <button type="submit" className="w-full bg-black text-white p-5 rounded-2xl font-black uppercase">Connexion</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="bg-white p-5 sticky top-0 z-30 border-b shadow-sm flex justify-between items-center">
                        <h1 className="font-black italic text-lg uppercase text-green-600 underline">MON STOCKAGE</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setView("receipt")} className="bg-blue-600 text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase">🧾 Ticket</button>
                            <button onClick={() => setView(view === "home" ? "shopping" : "home")} className="bg-black text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase">{view === "home" ? "Courses" : "Stock"}</button>
                        </div>
                    </header>

                    <main className="p-4">
                        {view === "receipt" && (
                            <div className="animate-up space-y-4">
                                <div className="bg-white p-8 rounded-[2.5rem] text-center border-2 border-dashed border-gray-300">
                                    <input type="file" accept="image/*,application/pdf" onChange={scanTicket} id="r-up" className="hidden" />
                                    <label htmlFor="r-up" className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-xs cursor-pointer inline-block shadow-lg active:scale-95">📷 Charger Photo / PDF</label>
                                    {loading && <p className="mt-4 text-[9px] font-black text-blue-500 animate-pulse uppercase">Analyse en cours...</p>}
                                </div>
                                {receiptItems.map((item, idx) => (
                                    <div key={idx} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-3">
                                        <div className="flex justify-between items-center">
                                            <span className="font-black text-xs uppercase text-gray-700 w-2/3 leading-tight">{item.nom}</span>
                                            <div className="flex items-center bg-gray-100 rounded-lg p-1">
                                                <button onClick={() => { const n = [...receiptItems]; n[idx].qte = Math.max(1, n[idx].qte - 1); setReceiptItems(n); }} className="w-6 h-6 bg-white rounded font-bold">-</button>
                                                <span className="px-2 font-black text-xs">x{item.qte}</span>
                                                <button onClick={() => { const n = [...receiptItems]; n[idx].qte += 1; setReceiptItems(n); }} className="w-6 h-6 bg-white rounded font-bold">+</button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <select className="p-2 bg-gray-50 rounded-xl text-[9px] font-bold outline-none" value={item.zone} onChange={(e) => { const n = [...receiptItems]; n[idx].zone = e.target.value; n[idx].rayon = STRUCTURE[e.target.value].rayons[0].id; setReceiptItems(n); }}>{Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{z}</option>)}</select>
                                            <select className="p-2 bg-gray-50 rounded-xl text-[9px] font-bold outline-none" value={item.rayon} onChange={(e) => { const n = [...receiptItems]; n[idx].rayon = e.target.value; setReceiptItems(n); }}>{STRUCTURE[item.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.id}</option>)}</select>
                                        </div>
                                    </div>
                                ))}
                                {receiptItems.length > 0 && <button onClick={async () => { setLoading(true); for(const i of receiptItems){ await syncWithServer({id:Date.now()+Math.random(),nom:i.nom,zone:i.zone,rayon:i.rayon,typeStock:'unite',stock:i.qte,date:"",congele:0}); } window.location.reload(); }} className="w-full bg-green-600 text-white p-5 rounded-[2.5rem] font-black uppercase text-xs shadow-xl tracking-widest active:scale-95">Tout Ajouter au Stock 🚀</button>}
                            </div>
                        )}

                        {view === "home" && Object.keys(STRUCTURE).map(zone => {
                            const zItems = produits.filter(p => p.zone === zone && Number(p.stock) > 0 && p.nom.toLowerCase().includes(searchTerm.toLowerCase()));
                            if (zItems.length === 0) return null;
                            return (
                                <div key={zone} className="mb-3">
                                    <button onClick={() => setOpenSections(prev => ({ ...prev, [zone]: !prev[zone] }))} className="w-full flex justify-between p-4 bg-white rounded-2xl shadow-sm font-black text-[10px] uppercase text-gray-500 tracking-widest">
                                        <span>{STRUCTURE[zone].icon} {zone}</span>
                                        <span className="opacity-30">{openSections[zone] ? "▲" : "▼"}</span>
                                    </button>
                                    {openSections[zone] && STRUCTURE[zone].rayons.map(ray => {
                                        const rItems = zItems.filter(p => p.rayon === ray.id);
                                        if (rItems.length === 0) return null;
                                        return (
                                            <div key={ray.id} className="ml-4 mt-2 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-2 animate-up">
                                                <button onClick={() => setOpenSections(prev => ({ ...prev, [ray.id]: !prev[ray.id] }))} className="w-full p-3 bg-gray-50/50 flex justify-between text-[9px] font-black uppercase text-gray-400">
                                                    <span>{ray.icon} {ray.id}</span>
                                                    <span>{rItems.length} {openSections[ray.id] ? "▲" : "▼"}</span>
                                                </button>
                                                {openSections[ray.id] && rItems.map(p => (
                                                    <div key={p.id} className="p-4 flex justify-between items-center border-t border-gray-50">
                                                        <div className="flex flex-col">
                                                            <span className="font-bold text-sm text-gray-800 uppercase leading-none mb-1">{p.nom}</span>
                                                            <span className="text-[9px] text-gray-400 italic font-bold uppercase">{p.congele == 1 ? "❄️ CONGELÉ" : p.date || "SANS DATE"}</span>
                                                        </div>
                                                        <div className="flex items-center gap-1">
                                                            <button onClick={() => toggleFreeze(p)} className={`w-8 h-8 rounded-lg border flex items-center justify-center transition-all ${p.congele == 1 ? "bg-blue-500 text-white" : "text-gray-200"}`}>❄️</button>
                                                            <button onClick={() => updateStock(p.id, -1)} className="w-8 h-8 bg-white border border-gray-100 rounded-lg font-bold shadow-sm">-</button>
                                                            <button onClick={() => updateStock(p.id, 1)} className="w-8 h-8 bg-white border border-gray-100 rounded-lg font-bold shadow-sm">+</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })}
                                </div>
                            );
                        })}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 backdrop-blur-md p-2 rounded-[2.5rem] flex justify-around items-center shadow-2xl z-40 border border-gray-100">
                        <button onClick={() => setView("home")} className={`p-4 transition-all duration-300 ${view === "home" ? "text-green-600 scale-125" : "text-gray-200"}`}>🏠</button>
                        <button onClick={() => setShowAddModal(true)} className="bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-xl active:scale-75 transition-all">＋</button>
                        <button onClick={() => setView("shopping")} className={`p-4 transition-all duration-300 ${view === "shopping" ? "text-green-600 scale-125" : "text-gray-200"}`}>🛒</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
