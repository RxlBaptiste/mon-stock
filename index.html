          if (!dateStr) return "SANS DLC";

        const getDlcStatus = (dateStr) => {
          if (!dateStr) return "none";

          const today = new Date();
          const dlc = new Date(dateStr);

          // Reset heure pour comparer proprement
          today.setHours(0, 0, 0, 0);
          dlc.setHours(0, 0, 0, 0);

          const diffTime = dlc - today;
          const diffDays = diffTime / (1000 * 60 * 60 * 24);

          if (diffDays < 0) return "expired"; // 🔴 périmé
          if (diffDays <= 4) return "warning"; // 🟠 proche

          return "ok";
        };

        const normalizeOCRPrice = (raw) => {
          if (!raw) return null;

          let s = String(raw)
            .toUpperCase()
            .replace(/[O]/g, "0")
            .replace(/[IIL]/g, "1")
            .replace(/\//g, "7")
            .replace(/\s+/g, "")
            .trim();

          if (/^\d+[.,]\d{2}$/.test(s)) {
            return parseFloat(s.replace(",", "."));
          }

          if (/^\d{3}$/.test(s)) {
            return parseFloat(s.slice(0, 1) + "." + s.slice(1));
          }

          if (/^\d{4}$/.test(s)) {
            return parseFloat(s.slice(0, 2) + "." + s.slice(2));
          }

          return null;
        };

        const cleanArticleName = (str) => {
          if (!str) return "";

          let s = normalizeText(str)

            .replace(/\b\d+\s*[Xx]\s*\d+[.,]\d{2}\b/g, " ")
            .replace(/\b\d+[.,]\d{2}\s*(€|EUR)?\b/g, " ")
            .replace(/\b\d+[.,]\d{3}\s*KG\b/gi, " ")
            .replace(/\b\d+%MG\b/gi, " ")
            .replace(/\b\d+%\b/g, " ")
            .replace(/\b\d+[Kk][Gg]\b/g, " ")
            .replace(/\b\d+[Gg]\b/g, " ")
            .replace(/\bP.U\.?\b/gi, " ")
            .replace(/\bPRIX\b/gi, " ")
            .replace(/\bPROMO\b/gi, " ")

            .replace(/\bA\b\s+\d+[.,]\d{2}\b/gi, " ")

            .replace(/\s{2,}/g, " ")

          s = s.replace(/[^A-ZÀ-ÖØ-öø-ÿ'\-\s]/gi, "").trim();

          return s.toUpperCase();
        };
        const isPriceLine = (line) => {
          if (!line) return false;
          const l = normalizeText(line).toUpperCase();

          return (
            /(\d+[.,]\d{2})\s*(€|EUR)?(\s+\d{1,2})?\s*$/.test(l) ||
            /^\d+\s*[Xx]\s*\d+[.,]\d{2}/.test(l) ||

        const extractPrice = (line) => {

        const isNoiseLine = (line) => {

            /NO\s+[X*]+/,
          ];

          if (noisePatterns.some((rx) => rx.test(l))) return true;

          // numéros très techniques / longs
          if (/^\d{6,}$/.test(l.replace(/\s/g, ""))) return true;

          // lignes presque uniquement numériques/symboles
          const alphaCount = (l.match(/[A-ZÀ-ÖØ-öø-ÿ]/gi) || []).length;
          if (alphaCount === 0 && /\d/.test(l)) return true;

          return false;
        };

        const extractTicketArticleCount = (text) => {
          const lines = (text || "")
            .split("\n")

          for (const line of lines) {
            let match = null;

            // PRIORITÉ 1 : Hyper U -> TOTAL [31] Articles
            match = line.match(/TOTAL\s*\[(\d+)\]\s*ARTICLES?/i);

            match = line.match(/TOTAL\s+(\d+)\s+ARTICLES?/i);

          // Si rien trouvé, on cherche les formats secondaires

            let match = null;

            match = line.match(/NOMBRE\s+D['’]ARTICLES?\s*[:\-]?\s*(\d+)/i);
            if (match) return parseInt(match[1], 10);

            match = line.match(/NB\s+ARTICLES?\s*[:\-]?\s*(\d+)/i);
            if (match) return parseInt(match[1], 10);

            match = line.match(/\b(\d+)\s+ARTICLES?\b/i);

            // En dernier seulement : nombre de lignes
            match = line.match(/NOMBRE\s+DE\s+LIGNES?\s+D['’]ARTICLE\s+(\d+)/i);

        const isSectionHeader = (line) => {

        const truncateReceiptForItems = (text) => {
          const lines = (text || "")
            .split("\n")
            .map((l) => normalizeText(l))
            .filter(Boolean);

          const stopPatterns = [
            /^TOTAL\s*\[?\s*\d+\s*\]?\s*ARTICLES?/i,
            /^TOTAL\s+\d+\s+ARTICLES?/i,
            /^SOUS[\s-]?TOTAL/i,
            /^TOTAL\s+TVA/i,
            /^CB\b/i,
            /CARTE\s+BANCAIRE/i,
            /CREDIT\s+AGRICOLE/i,
            /MERCI\s+DE\s+VOTRE\s+VISITE/i,
          ];

          const stopIndex = lines.findIndex((line) =>
            stopPatterns.some((rx) => rx.test(line)),
          );

          if (stopIndex === -1) return lines.join("\n");

          return lines.slice(0, stopIndex).join("\n");
        };

        const isQuantityLine = (line) => {
          return extractQuantityInfo(line) !== null;
        };

        const extractQuantityFromLine = (line) => {
          const info = extractQuantityInfo(line);
          return info ? info.qty : null;
        };

        const extractUnitPriceFromQuantityLine = (line) => {
          const info = extractQuantityInfo(line);
          return info ? info.unitPrice : null;
        };

        const extractTrailingPrice = (line) => {
          if (!line) return null;
          const l = normalizeText(line).toUpperCase();

          const m = l.match(/(\d+[.,]\d{2})\s*(€|EUR)?(\s+\d{1,2})?\s*$/);
          return m ? parseFloat(m[1].replace(",", ".")) : null;
        };

        const isWeightedDetailLine = (line) => {
          if (!line) return false;
          const l = normalizeText(line).toUpperCase();

          return (
            /PESEE MANUELLE/.test(l) ||
            /PESÉE MANUELLE/.test(l) ||
            /\d+[.,]\d+\s*KG\s*[Xx]\s*\d+[.,]\d+\s*€?\s*\/?\s*KG/.test(l) ||
            /\d+[.,]\d+\s*KG\s*[Xx]/.test(l) ||
            /€\s*\/\s*KG/.test(l)
          );
        };

        const extractQuantityInfo = (line) => {
          if (!line) return null;
          const l = normalizeText(line).toUpperCase();

          const m = l.match(
            /(\d+)\s*[Xx*]\s*([0-9OIL.,\/]+)\s*(?:€|EUR)?(?:\s+([0-9OIL.,\/]+))?\s*$/i,
          );
          if (!m) return null;

          return {
            qty: parseInt(m[1], 10),
            unitPrice: parseFloat(m[2].replace(",", ".")),
            totalPrice: m[3] ? parseFloat(m[3].replace(",", ".")) : null,
          };
        };

        const stripTrailingQuantitySegment = (line) => {
          if (!line) return "";
          return normalizeText(line)
            .replace(
              /(\d+)\s*[Xx*]\s*([0-9OIL.,\/]+)\s*(?:€|EUR)?(?:\s+([0-9OIL.,\/]+))?\s*$/i,
              "",
            )
            .trim();
        };

        const parseReceiptLines = (text) => {
          let lines = text
            .split("\n")
            .map((l) => normalizeText(l))
            .filter(Boolean);

          const results = [];
          let pendingName = null;
          let lastProductIndex = null;
          let lastProductTotalPrice = null;

          const pushArticle = (rawName, qte = 1) => {
            const nom = cleanArticleName(rawName);
            if (!nom || nom.length < 3) return null;

            if (
              nom.includes("TOTAL") ||
              nom.includes("MONTANT") ||
              nom.includes("PAYE") ||
              nom.includes("TVA") ||
              nom.includes("CARTE") ||
              nom.includes("FIDELITE") ||
              nom.includes("REMISE") ||
              nom.includes("REDUCTION") ||
              nom.includes("BON DE REDUCTION")
            )
              return null;

            const existing = results.findIndex((p) => p.nom === nom);
            if (existing !== -1) {
              results[existing].qte += qte;
              return existing;
            }

            const cat = detectCategory(nom);

            const defaultMaturityResult =
              cat.zone === "Alimentaire" && cat.rayon === "Fruits et Légumes"
                ? getEstimatedDateFromProduce(nom, 1)
                : null;

            results.push({
              nom,
              qte,
              dlc: defaultMaturityResult ? defaultMaturityResult.date : "",
              maturite: defaultMaturityResult
                ? defaultMaturityResult.maturite
                : "",
              congele: false,
              zone: cat.zone,
              rayon: cat.rayon,
              typeStock: "unite",
            });

            return results.length - 1;
          };

          for (let i = 0; i < lines.length; i++) {
            const current = lines[i];
            const currentUpper = current.toUpperCase();
            console.log("LINE:", currentUpper);

            if (
              isNoiseLine(currentUpper) ||
              isWeightedDetailLine(currentUpper)
            ) {
              continue;
            }

            if (isSectionHeader(currentUpper)) {
              pendingName = null;
              lastProductIndex = null;
              lastProductTotalPrice = null;
              continue;
            }

            const qtyInfo = extractQuantityInfo(currentUpper);
            if (qtyInfo) {
              console.log("QTY LINE DETECTED:", {
                line: currentUpper,
                qtyInfo,
                pendingName,
                lastProductIndex,
                lastProductTotalPrice,
              });
            }

            // CAS 1 : ligne avec quantité à la fin, parfois fusionnée avec le produit
            if (qtyInfo) {
              const beforeQty = stripTrailingQuantitySegment(currentUpper);

              const beforeQtyWithoutTrailingPrice = beforeQty
                .replace(/(\d+[.,]\d{2})\s*(€|EUR)?(\s+\d{1,2})?\s*$/, "")
                .trim();

              const cleanedBeforeQty = cleanArticleName(
                beforeQtyWithoutTrailingPrice || beforeQty,
              );

              // Exemple Leclerc :
              // "BAGUETTE NATURE,280G 2 X 0.85€ 1.70"
              // Exemple Hyper U fusionné :
              // "POITRINE PORC FUM.PXM 4TR 300G 5,74 € 11 2 X 2,87 EUR"
              if (
                cleanedBeforeQty.length >= 3 &&
                !isSectionHeader(beforeQty) &&
                !isNoiseLine(beforeQty)
              ) {
                lastProductIndex = pushArticle(beforeQty, qtyInfo.qty);
                pendingName = null;
                lastProductTotalPrice = extractTrailingPrice(beforeQty);
                continue;
              }

              // CAS 2 : vraie ligne quantité seule, juste sous le produit
              if (lastProductIndex !== null) {
                if (
                  qtyInfo.unitPrice !== null &&
                  lastProductTotalPrice !== null &&
                  Math.abs(
                    qtyInfo.qty * qtyInfo.unitPrice - lastProductTotalPrice,
                  ) < 0.03
                ) {
                  results[lastProductIndex].qte = qtyInfo.qty;
                } else if (
                  qtyInfo.totalPrice !== null &&
                  lastProductTotalPrice !== null
                ) {
                  if (
                    Math.abs(qtyInfo.totalPrice - lastProductTotalPrice) < 0.03
                  ) {
                    results[lastProductIndex].qte = qtyInfo.qty;
                  }
                } else {
                  results[lastProductIndex].qte = qtyInfo.qty;
                }
                continue;
              }

              if (pendingName && !isSectionHeader(pendingName)) {
                lastProductIndex = pushArticle(pendingName, qtyInfo.qty);
                pendingName = null;
                continue;
              }

              continue;
            }

            // Ligne produit avec prix sur la même ligne
            if (isPriceLine(currentUpper)) {
              let candidate = currentUpper
                .replace(/(\d+[.,]\d{2})\s*(€|EUR)?(\s+\d{1,2})?\s*$/, "")
                .trim();

              const totalPrice = extractTrailingPrice(currentUpper);
              console.log("PRICE LINE:", {
                line: currentUpper,
                candidate,
                totalPrice,
              });

              if (
                cleanArticleName(candidate).length >= 3 &&
                !isSectionHeader(candidate) &&
                !isNoiseLine(candidate)
              ) {
                lastProductIndex = pushArticle(candidate, 1);
                pendingName = null;
                lastProductTotalPrice = totalPrice;
                continue;
              }

              if (pendingName && !isSectionHeader(pendingName)) {
                lastProductIndex = pushArticle(pendingName, 1);
                pendingName = null;
                lastProductTotalPrice = totalPrice;
                continue;
              }

              continue;
            }

            // Ligne article potentielle
            const cleaned = cleanArticleName(currentUpper);
            if (
              cleaned.length >= 3 &&
              !isSectionHeader(currentUpper) &&
              !isNoiseLine(currentUpper) &&
              !isWeightedDetailLine(currentUpper)
            ) {
              pendingName = currentUpper;
              lastProductIndex = null;
              lastProductTotalPrice = null;
            }
          }

          return results;
        };

        // --- SCANNER TICKET ---
        const scanTicket = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          setLoading(true);
          setReceiptItems([]);
          setReceiptStats({
            detectedLines: 0,
            detectedQty: 0,
            ticketQty: null,
          });

          let worker = null;
          let objectUrl = null;

          try {
            let source = "";

            if (file.type === "application/pdf") {
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer })
                .promise;

              // On lit les 2 premières pages max, utile si ticket PDF un peu long
              let fullText = "";

              for (
                let pageNum = 1;
                pageNum <= Math.min(pdf.numPages, 2);
                pageNum++
              ) {
                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: 2.5 });
                const canvas = document.createElement("canvas");
                const context = canvas.getContext("2d");

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport }).promise;
                const imgData = canvas.toDataURL("image/png");

                if (!worker) {
                  worker = await Tesseract.createWorker("fra");
                  await worker.setParameters({
                    preserve_interword_spaces: "1",
                  });
                }

                const {
                  data: { text },
                } = await worker.recognize(imgData);
                fullText += "\n" + text;
              }

              const rawText = fullText;
              const itemsText = truncateReceiptForItems(rawText);

              const items = parseReceiptLines(itemsText);
              console.log("RAW OCR TEXT PDF:");
              console.log(rawText);
              console.log("ITEMS TEXT PDF:");
              console.log(itemsText);

              const ticketQty = extractTicketArticleCount(rawText);

              setReceiptItems(items);
              setReceiptStats({
                detectedLines: items.length,
                detectedQty: items.reduce(
                  (sum, item) => sum + (Number(item.qte) || 0),
                  0,
                ),
                ticketQty,
              });
            } else {
              objectUrl = URL.createObjectURL(file);
              source = objectUrl;

              worker = await Tesseract.createWorker("fra");
              await worker.setParameters({
                preserve_interword_spaces: "1",
              });

              const {
                data: { text },
              } = await worker.recognize(source);
              const rawText = text;
              const itemsText = truncateReceiptForItems(rawText);

              const items = parseReceiptLines(itemsText);
              console.log("RAW OCR TEXT IMAGE:");
              console.log(rawText);
              console.log("ITEMS TEXT IMAGE:");
              console.log(itemsText);

              const ticketQty = extractTicketArticleCount(rawText);

              setReceiptItems(items);
              setReceiptStats({
                detectedLines: items.length,
                detectedQty: items.reduce(
                  (sum, item) => sum + (Number(item.qte) || 0),
                  0,
                ),
                ticketQty,
              });
            }
          } catch (err) {
            console.error("Erreur scan ticket :", err);
            alert("Impossible d'analyser ce ticket.");
          } finally {
            if (worker) await worker.terminate();
            if (objectUrl) URL.revokeObjectURL(objectUrl);
            setLoading(false);
            e.target.value = "";
          }
        };

            if (p.id !== id) return p;
            let next =
              p.typeStock === "pourcent"

                : Number(p.stock) + delta;
            if (next <= 0) {
              setConfirmDelete({ show: true, produit: p });
              return p;
            }
            const u = {
              ...p,
              stock: Math.max(
                0,
                p.typeStock === "pourcent" ? Math.min(100, next) : next,
              ),
            };
            syncWithServer(u);
            return u;

              )}
            </main>

            {/* MODALE AJOUT MANUEL */}
            {showAddModal && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end z-[60] p-4">
                <div className="bg-white w-full rounded-[2.5rem] p-8 max-w-sm mx-auto animate-up shadow-2xl">
                  <h2 className="text-center font-black mb-6 uppercase text-gray-300 text-[10px] tracking-widest italic">
                    Nouveau Produit
                  </h2>
                  <input
                    type="text"
                    placeholder="NOM DU PRODUIT..."
                    className="w-full p-4 bg-gray-50 rounded-2xl mb-4 font-bold text-sm outline-none border-none focus:ring-2 focus:ring-green-500 shadow-inner"
                    value={form.nom}
                    onChange={(e) =>
                      setForm({ ...form, nom: e.target.value.toUpperCase() })
                    }
                  />
                  <div className="flex gap-2 mb-4 bg-gray-100 p-1.5 rounded-2xl shadow-inner">
                    <button
                      onClick={() => setForm({ ...form, typeStock: "unite" })}
                      className={`flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${form.typeStock === "unite" ? "bg-white shadow-md text-black" : "text-gray-300"}`}
                    >
                      Unités
                    </button>
                    <button
                      onClick={() =>
                        setForm({ ...form, typeStock: "pourcent" })
                      }
                      className={`flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${form.typeStock === "pourcent" ? "bg-white shadow-md text-black" : "text-gray-400"}`}
                    >
                      Pourcent %
                    </button>
                  </div>
                  <div className="grid grid-cols-2 gap-2 mb-4">
                    <select
                      className="p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold outline-none"
                      value={form.zone}
                      onChange={(e) =>
                        setForm({
                          ...form,
                          zone: e.target.value,
                          rayon: STRUCTURE[e.target.value].rayons[0].id,
                          ...(STRUCTURE[e.target.value].rayons[0].id !==
                          "Fruits et Légumes"
                            ? { maturite: "", date: "" }
                            : {}),
                        })
                      }
                    >
                      {Object.keys(STRUCTURE).map((z) => (
                        <option key={z} value={z}>
                          {z}
                        </option>
                      ))}
                    </select>

                    <select
                      className="p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold outline-none"
                      value={form.rayon}
                      onChange={(e) =>
                        setForm({
                          ...form,
                          rayon: e.target.value,
                          ...(e.target.value !== "Fruits et Légumes"
                            ? { maturite: "", date: "" }
                            : {}),
                        })
                      }
                    >
                      {STRUCTURE[form.zone].rayons.map((r) => (
                        <option key={r.id} value={r.id}>
                          {r.id}
                        </option>
                      ))}
                    </select>
                  </div>
                  <div className="mb-6 space-y-3">
                    {form.rayon === "Fruits et Légumes" ? (
                      <div className="space-y-3">
                        <p className="text-[8px] font-black text-gray-400 uppercase ml-1">
                          État de maturité :
                        </p>

                        <div className="flex gap-1">
                          {["Pas mûr", "Bientôt", "Mûr"].map((label, idx) => {
                            const trueLabel =
                              idx === 0
                                ? "Pas mûr"
                                : idx === 1
                                  ? "Bientôt mûr"
                                  : "Mûr";

                            return (
                              <button
                                key={label}
                                type="button"
                                onClick={() => handleMaturity(form.nom, idx)}
                                className={`flex-1 py-3 rounded-xl text-[8px] font-black uppercase transition-all border-2 ${
                                  form.maturite === trueLabel
                                    ? "bg-orange-500 border-orange-600 text-white shadow-lg"
                                    : "bg-gray-50 border-transparent text-gray-400"
                                }`}
                              >
                                {label}
                              </button>
                            );
                          })}
                        </div>

                        <input
                          type="date"
                          className="w-full p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold outline-none"
                          value={form.date}
                          onChange={(e) =>
                            setForm({ ...form, date: e.target.value })
                          }
                        />

                        {form.date && (
                          <p className="text-center text-[9px] font-bold text-orange-600 uppercase">
                            Prévu jusqu’au :{" "}
                            {form.date.split("-").reverse().join("/")}
                          </p>
                        )}
                      </div>
                    ) : (
                      <div className="space-y-2">
                        <p className="text-[8px] font-black text-gray-400 uppercase ml-1">
                          Date de péremption :
                        </p>
                        <input
                          type="date"
                          className="w-full p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold outline-none"
                          value={form.date}
                          onChange={(e) =>
                            setForm({ ...form, date: e.target.value })
                          }
                        />
                      </div>
                    )}

                    <input
                      type="number"
                      placeholder="QTÉ"
                      className="w-full p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold outline-none"
                      value={form.stock}
                      onChange={(e) =>
                        setForm({ ...form, stock: Number(e.target.value) })
                      }
                    />
                  </div>
                  <div className="space-y-3 mb-8">
                    <label className="flex items-center gap-3 p-4 bg-blue-50/50 rounded-2xl cursor-pointer active:scale-95 transition-all">
                      <input
                        type="checkbox"
                        checked={form.congele}
                        onChange={(e) =>
                          setForm({ ...form, congele: e.target.checked })
                        }
                        className="w-6 h-6 accent-blue-500 rounded-lg shadow-sm"
                      />
                      <span className="text-[10px] font-black text-blue-800 uppercase italic">
                        Placé au congélateur ❄️
                      </span>
                    </label>
                    <label className="flex items-center gap-3 p-4 bg-red-50/50 rounded-2xl cursor-pointer active:scale-95 transition-all">
                      <input
                        type="checkbox"
                        checked={form.directShopping}
                        onChange={(e) =>
                          setForm({ ...form, directShopping: e.target.checked })
                        }
                        className="w-6 h-6 accent-red-500 rounded-lg shadow-sm"
                      />
                      <span className="text-[10px] font-black text-red-700 uppercase italic">
                        Ajouter directement aux courses 🛒
                      </span>
                    </label>
                  </div>
                  <div className="flex flex-col gap-2">
                    <button
                      onClick={async () => {
                        const n = {
                          ...form,
                          id: Date.now(),
                          stock: form.directShopping ? 0 : Number(form.stock),
                          congele: form.congele ? 1 : 0,
                          checked: 0,
                        };
                        setProduits([n, ...produits]);
                        await syncWithServer(n);
                        setShowAddModal(false);
                        setForm({
                          nom: "",
                          zone: "Alimentaire",
                          rayon: "Fruits et Légumes",
                          typeStock: "unite",
                          stock: 1,
                          date: "",
                          maturite: "",
                          directShopping: false,
                          congele: false,
                        });
                      }}
                      className="w-full bg-green-600 text-white p-5 rounded-[2.5rem] font-black uppercase text-xs shadow-xl tracking-widest active:scale-95 transition-all"
                    >
                      Enregistrer ✅
                    </button>
                    <button
                      onClick={() => {
                        setShowAddModal(false);
                        setForm({
                          nom: "",
                          zone: "Alimentaire",
                          rayon: "Fruits et Légumes",
                          typeStock: "unite",
                          stock: 1,
                          date: "",
                          maturite: "",
                          directShopping: false,
                          congele: false,
                        });
                      }}
                      className="w-full text-gray-300 text-[10px] font-black uppercase text-center py-2"
                    >
                      Annuler
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* MODALE SUPPRESSION DESIGN */}
            {confirmDelete.show && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[110] p-6 text-center">
                <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl animate-up border-4 border-green-500">
                  <div className="text-4xl mb-4">🛒</div>
                  <h3 className="font-black uppercase text-sm mb-2 text-gray-800">
                    Stock épuisé !
                  </h3>
                  <p className="text-gray-500 text-xs mb-8 leading-relaxed">
                    Ajouter{" "}
                    <span className="text-green-600 font-bold">
                      {confirmDelete.produit?.nom}
                    </span>{" "}
                    à votre liste de courses ?
                  </p>
                  <div className="flex flex-col gap-3">
                    <button
                      onClick={() => {
                        const p = confirmDelete.produit;
                        const u = { ...p, stock: 0 };
                        setProduits(
                          produits.map((i) => (i.id === p.id ? u : i)),
                        );
                        syncWithServer(u);
                        setConfirmDelete({ show: false, produit: null });
                      }}
                      className="w-full bg-green-600 text-white p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg active:scale-95 transition-all"
                    >
                      Oui, mettre en courses
                    </button>
                    <button
                      onClick={() => {
                        const p = confirmDelete.produit;
                        fetch(
                          `${API_URL}?action=delete_product&id=${p.id}&user=${currentUser}`,
                        );
                        setProduits(produits.filter((i) => i.id !== p.id));
                        setConfirmDelete({ show: false, produit: null });
                      }}
                      className="w-full bg-gray-100 text-gray-400 p-4 rounded-2xl font-black uppercase text-[10px] active:scale-95 transition-all"
                    >
                      Non, supprimer
                    </button>
                    <button
                      onClick={() =>
                        setConfirmDelete({ show: false, produit: null })
                      }
                      className="text-[9px] font-black text-gray-300 uppercase mt-2"
                    >
                      Annuler
                    </button>
                  </div>
                </div>
              </div>
            )}

            {showSeasonModal && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end z-[80] p-4">
                <div className="bg-white w-full rounded-[2.5rem] p-6 max-w-sm mx-auto animate-up shadow-2xl">
                  <h2 className="text-center font-black mb-6 uppercase text-gray-400 text-[10px] tracking-widest italic">
                    Produits de saison
                  </h2>

                  <div className="space-y-5">
                    <div>
                      <h3 className="font-black text-[10px] uppercase text-orange-500 mb-2">
                        Fruits
                      </h3>
                      <div className="flex flex-wrap gap-2">
                        {getCurrentMonthSeason().fruits.map((item) => (
                          <button
                            key={item}
                            onClick={async () => {
                              if (
                                produits.some(
                                  (p) =>
                                    p.nom === item && Number(p.stock) === 0,
                                )
                              )
                                return;

                              const result = getEstimatedDateFromProduce(
                                item,
                                1,
                              );

                              const n = {
                                id: Date.now() + Math.random(),
                                nom: item,
                                zone: "Alimentaire",
                                rayon: "Fruits et Légumes",
                                typeStock: "unite",
                                stock: 0,
                                date: result.date,
                                maturite: result.maturite,
                                note: "Produit de saison",
                                congele: 0,
                              };

                              setProduits((prev) => [n, ...prev]);
                              await syncWithServer(n);
                            }}
                            className="px-3 py-2 bg-orange-50 text-orange-600 rounded-xl text-[9px] font-black uppercase"
                          >
                            {item}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <h3 className="font-black text-[10px] uppercase text-green-600 mb-2">
                        Légumes
                      </h3>
                      <div className="flex flex-wrap gap-2">
                        {getCurrentMonthSeason().legumes.map((item) => (
                          <button
                            key={item}
                            onClick={async () => {
                              if (
                                produits.some(
                                  (p) =>
                                    p.nom === item && Number(p.stock) === 0,
                                )
                              )
                                return;

                              const result = getEstimatedDateFromProduce(
                                item,
                                1,
                              );

                              const n = {
                                id: Date.now() + Math.random(),
                                nom: item,
                                zone: "Alimentaire",
                                rayon: "Fruits et Légumes",
                                typeStock: "unite",
                                stock: 0,
                                date: result.date,
                                maturite: result.maturite,
                                note: "Produit de saison",
                                congele: 0,
                              };

                              setProduits((prev) => [n, ...prev]);
                              await syncWithServer(n);
                            }}
                            className="px-3 py-2 bg-green-50 text-green-600 rounded-xl text-[9px] font-black uppercase"
                          >
                            {item}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>

                  <button
                    onClick={() => setShowSeasonModal(false)}
                    className="w-full mt-6 bg-black text-white p-4 rounded-2xl font-black uppercase text-[10px]"
                  >
                    Fermer
                  </button>
                </div>
              </div>
            )}

            <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 backdrop-blur-md p-2 rounded-[2.5rem] flex justify-around items-center shadow-2xl z-40 border border-gray-100">
              <button
                onClick={() => setView("home")}
                className={`p-4 transition-all duration-300 ${view === "home" ? "text-green-600 scale-125" : "text-gray-200"}`}
              >
                🏠
              </button>
              <button
                onClick={() => setShowAddModal(true)}
                className="bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-xl active:scale-75 transition-all font-light tracking-tighter"
              >
                ＋
              </button>
              <button
                onClick={() => setView("shopping")}
                className={`p-4 transition-all duration-300 ${view === "shopping" ? "text-green-600 scale-125" : "text-gray-200"}`}
              >
                🛒
              </button>
            </nav>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
