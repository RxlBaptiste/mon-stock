<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mon Stock Pro v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	<style>
        body { touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 1. CONFIGURATION DES CATÉGORIES (ZONES ET RAYONS)
        const STRUCTURE = {
            "Alimentaire": {
                icon: "🍎",
                rayons: [
                    { id: "Produits Frais", icon: "🧺" }, // Changement d'icône ici
                    { id: "Surgelés", icon: "❄️" },
                    { id: "Épicerie Salée", icon: "🧂" },
                    { id: "Épicerie Sucrée", icon: "🍪" },
                    { id: "Boulangerie", icon: "🥖" },
                    { id: "Boissons", icon: "🍷" }
                ]
            },
            "Hygiène & Santé": {
                icon: "✨",
                rayons: [
                    { id: "Hygiène Corporelle", icon: "🧼" },
                    { id: "Soin & Beauté", icon: "💄" },
                    { id: "Hygiène Papier", icon: "🧻" },
                    { id: "Parapharmacie", icon: "🩹" },
                    { id: "Bébé", icon: "👶" }
                ]
            },
            "Entretien & Maison": {
                icon: "🏠",
                rayons: [
                    { id: "Entretien", icon: "🧹" },
                    { id: "Droguerie", icon: "🔋" },
                    { id: "Arts de la table", icon: "🍽️" },
                    { id: "Linge", icon: "🛌" }
                ]
            }
        };

        const App = () => {
            const [produits, setProduits] = useState(() => {
                const saved = localStorage.getItem('mon_stock_v6');
                return saved ? JSON.parse(saved) : [];
            });

            const [view, setView] = useState('home');
            const [showAddModal, setShowAddModal] = useState(false);
            const [openSections, setOpenSections] = useState({}); // Pour les accordéons
            
            // Formulaire
            const [form, setForm] = useState({ 
                nom: '', zone: 'Alimentaire', rayon: 'Produits Frais', 
                typeStock: 'pourcent', stock: 1, date: '', directShopping: false 
            });

            useEffect(() => {
                localStorage.setItem('mon_stock_v6', JSON.stringify(produits));
            }, [produits]);

            const toggleSection = (id) => setOpenSections(prev => ({...prev, [id]: !prev[id]}));

            const updateStock = (id, delta) => {
                setProduits(produits.map(p => {
                    if (p.id !== id) return p;
                    let next = p.typeStock === 'pourcent' ? p.stock + (delta * 25) : p.stock + delta;
                    if (next <= 0) {
                        return confirm(`Plus de ${p.nom}. Mettre en liste de courses ?`) ? { ...p, stock: 0, checked: false } : null;
                    }
                    return { ...p, stock: Math.max(0, p.typeStock === 'pourcent' ? Math.min(100, next) : next) };
                }).filter(Boolean));
            };

            const ajouterNouveau = () => {
                if (!form.nom) return;
                const rayonIcon = STRUCTURE[form.zone].rayons.find(r => r.id === form.rayon).icon;
                const p = { 
                    ...form, 
                    id: Date.now(), 
                    icon: rayonIcon,
                    stock: form.directShopping ? 0 : (form.typeStock === 'pourcent' ? 100 : form.stock),
                    checked: false
                };
                setProduits([p, ...produits]);
                setShowAddModal(false);
                setForm({ nom: '', zone: 'Alimentaire', rayon: 'Produits Frais', typeStock: 'pourcent', stock: 1, date: '', directShopping: false });
            };

            const validateShopping = () => {
                setProduits(produits.map(p => {
                    if (!p.checked) return p;
                    const qte = p.typeStock === 'unite' ? (parseInt(prompt(`Quantité pour ${p.nom} ?`, "1")) || 1) : 100;
                    const d = prompt(`Date péremption ?`, "");
                    return { ...p, stock: qte, checked: false, date: d };
                }));
            };

            return (
                <div className="max-w-md mx-auto bg-gray-100 min-h-screen pb-24 font-sans shadow-xl">
                    
                    {/* HEADER */}
                    <header className="bg-white p-5 sticky top-0 z-30 border-b flex justify-between items-center shadow-sm">
                        <h1 className="font-black text-lg text-gray-800 uppercase tracking-tighter italic">
                            {view === 'home' ? '🏠 Mon Inventaire' : '🛒 Liste de Courses'}
                        </h1>
                        <button onClick={() => setView(view === 'home' ? 'shopping' : 'home')} className="bg-gray-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase">
                            {view === 'home' ? 'Aller aux courses' : 'Retour Stock'}
                        </button>
                    </header>

                    {/* VUE STOCK */}
                    {view === 'home' && (
                        <div className="p-4 space-y-4">
                            {Object.keys(STRUCTURE).map(zone => {
                                const zoneItems = produits.filter(p => p.zone === zone && p.stock > 0);
                                if (zoneItems.length === 0) return null;

                                return (
                                    <div key={zone} className="mb-4">
                                        <button onClick={() => toggleSection(zone)} className="w-full flex items-center justify-between p-3 bg-white rounded-2xl shadow-sm border border-gray-100 mb-2 font-bold text-gray-700">
                                            <div className="flex items-center gap-3">
                                                <span>{STRUCTURE[zone].icon}</span> {zone}
                                            </div>
                                            <span className="text-xs opacity-30">{openSections[zone] ? '▲' : '▼'}</span>
                                        </button>

                                        {openSections[zone] && (
                                            <div className="pl-4 space-y-2">
                                                {STRUCTURE[zone].rayons.map(rayon => {
                                                    const rayonItems = zoneItems.filter(p => p.rayon === rayon.id);
                                                    if (rayonItems.length === 0) return null;

                                                    return (
                                                        <div key={rayon.id} className="bg-white/50 rounded-2xl overflow-hidden border border-gray-200 shadow-sm">
                                                            <button onClick={() => toggleSection(rayon.id)} className="w-full p-3 flex justify-between items-center text-sm font-semibold text-gray-500 bg-white/80">
                                                                <div className="flex items-center gap-2"><span>{rayon.icon}</span> {rayon.id}</div>
                                                                <span className="text-[10px]">{rayonItems.length}</span>
                                                            </button>
                                                            {openSections[rayon.id] && (
                                                                <div className="p-2 space-y-2 bg-white">
                                                                    {rayonItems.map(p => (
                                                                        <div key={p.id} className="p-3 bg-gray-50 rounded-xl border border-gray-100 shadow-inner">
                                                                            <div className="flex justify-between items-center mb-2">
                                                                                <span className="font-bold text-sm">{p.nom}</span>
                                                                                <span className="text-[10px] font-black">{p.typeStock === 'pourcent' ? p.stock+'%' : 'Qté: '+p.stock}</span>
                                                                            </div>
                                                                            <div className="flex justify-between items-center">
                                                                                <span className="text-[10px] text-gray-400 italic font-medium">{p.date ? '⌛ '+p.date : '♻️ Sans date'}</span>
                                                                                <div className="flex gap-2">
                                                                                    <button onClick={() => updateStock(p.id, -1)} className="w-8 h-8 bg-white border rounded-lg font-bold shadow-sm">-</button>
                                                                                    <button onClick={() => updateStock(p.id, 1)} className="w-8 h-8 bg-white border rounded-lg font-bold shadow-sm">+</button>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* VUE COURSES */}
                    {view === 'shopping' && (
                        <div className="p-4">
                            <div className="bg-white rounded-3xl border shadow-sm">
                                {produits.filter(p => p.stock === 0 || p.checked).map(p => (
                                    <div key={p.id} className="flex items-center justify-between p-4 border-b last:border-0">
                                        <div className="flex items-center gap-4">
                                            <input type="checkbox" checked={p.checked} onChange={() => setProduits(produits.map(i => i.id === p.id ? {...i, checked: !i.checked} : i))} className="w-5 h-5 accent-black" />
                                            <div>
                                                <p className={`font-bold text-sm ${p.checked ? 'line-through opacity-30' : ''}`}>{p.nom}</p>
                                                <p className="text-[10px] text-gray-400 uppercase font-bold">{p.rayon}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setProduits(produits.filter(i => i.id !== p.id))} className="text-gray-300">✕</button>
                                    </div>
                                ))}
                            </div>
                            {produits.some(p => p.checked) && (
                                <button onClick={validateShopping} className="w-full mt-6 bg-green-500 text-white p-5 rounded-3xl font-black shadow-xl animate-bounce">🛒 VALIDER MES ACHATS</button>
                            )}
                        </div>
                    )}

                    {/* MODAL AJOUT */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-end z-50 p-4">
                            <div className="bg-white w-full rounded-[35px] p-6 max-w-sm mx-auto shadow-2xl overflow-y-auto max-h-[90vh]">
                                <h2 className="text-center font-black mb-6 uppercase text-gray-400">Ajouter un produit</h2>
                                
                                <input type="text" placeholder="Nom (Pâtes, Shampoing...)" className="w-full p-4 bg-gray-50 rounded-2xl mb-4 border outline-none font-bold" value={form.nom} onChange={e => setForm({...form, nom: e.target.value})} />
                                
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    <select className="p-3 bg-gray-50 border rounded-xl text-xs font-bold" value={form.zone} onChange={e => setForm({...form, zone: e.target.value, rayon: STRUCTURE[e.target.value].rayons[0].id})}>
                                        {Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{STRUCTURE[z].icon} {z}</option>)}
                                    </select>
                                    <select className="p-3 bg-gray-50 border rounded-xl text-xs font-bold" value={form.rayon} onChange={e => setForm({...form, rayon: e.target.value})}>
                                        {STRUCTURE[form.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.icon} {r.id}</option>)}
                                    </select>
                                </div>

                                <div className="flex gap-2 mb-4 bg-gray-100 p-1 rounded-xl">
                                    <button onClick={() => setForm({...form, typeStock: 'pourcent'})} className={`flex-1 py-2 rounded-lg text-[10px] font-bold ${form.typeStock === 'pourcent' ? 'bg-white shadow-sm' : 'text-gray-400'}`}>% Contenant</button>
                                    <button onClick={() => setForm({...form, typeStock: 'unite'})} className={`flex-1 py-2 rounded-lg text-[10px] font-bold ${form.typeStock === 'unite' ? 'bg-white shadow-sm' : 'text-gray-400'}`}>123 Unité</button>
                                </div>

                                <label className="flex items-center gap-3 mb-4 p-4 bg-red-50 rounded-2xl cursor-pointer border-2 border-dashed border-red-100">
                                    <input type="checkbox" checked={form.directShopping} onChange={e => setForm({...form, directShopping: e.target.checked})} className="w-5 h-5 accent-red-500" />
                                    <span className="text-xs font-bold text-red-700 italic">Ajouter DIRECTEMENT en liste de courses</span>
                                </label>

                                <button onClick={ajouterNouveau} className="w-full bg-black text-white p-5 rounded-2xl font-black shadow-lg mb-4 active:scale-95 transition-all">ENREGISTRER</button>
                                <button onClick={() => setShowAddModal(false)} className="w-full text-gray-400 text-xs font-bold uppercase">Annuler</button>
                            </div>
                        </div>
                    )}

                    {/* BARRE NAV */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white border border-gray-200 p-2 rounded-[35px] flex justify-around items-center shadow-2xl z-40">
                        <button onClick={() => setView('home')} className={`p-4 transition-all ${view === 'home' ? 'text-green-500 scale-125' : 'text-gray-300 opacity-20'}`}>🏠</button>
                        <button onClick={() => setShowAddModal(true)} className="bg-black text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-xl">+</button>
                        <button onClick={() => setView('shopping')} className={`p-4 transition-all ${view === 'shopping' ? 'text-green-500 scale-125' : 'text-gray-300 opacity-20'}`}>🛒</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
