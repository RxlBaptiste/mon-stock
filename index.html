<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="data:application/manifest+json,{'display':'standalone','name':'Mon Stock Pro','short_name':'Stock','start_url':'/','background_color':'#ffffff','theme_color':'#22c55e'}" />
    <title>Mon Stock Expert v19</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { touch-action: manipulation; font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-orange { 0%, 100% { background-color: #fff; } 50% { background-color: #fff7ed; } }
        .warning-dlc { animation: pulse-orange 2s infinite; border: 2px solid #fb923c !important; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = "https://baptisterouxel.fr/stock/api.php";
        const { useState, useEffect } = React;

        const MON_MOT_DE_PASSE = "CeciEstMonMotDePasseDeStock_22"; 

        const STRUCTURE = {
            "Alimentaire": { icon: "🍎", rayons: [
                { id: "Fruit et légume", icon: "🧺" }, { id: "Viande", icon: "🥩" }, { id: "Poisson", icon: "🐟" },
                { id: "Cremerie", icon: "🥛" }, { id: "Fromagerie", icon: "🧀" }, { id: "Surgelées", icon: "❄️" },
                { id: "Salée", icon: "🧂" }, { id: "Sucré", icon: "🍪" }, { id: "Boulangerie", icon: "🥖" },
                { id: "Boissons", icon: "🍷" }
            ]},
            "Hygiène": { icon: "✨", rayons: [
                { id: "Corporelle", icon: "🧼" }, { id: "Soin", icon: "💄" }, { id: "Hygiene papier", icon: "🧻" },
                { id: "Parapharmacie", icon: "🩹" }, { id: "Produit d'entretien", icon: "🧹" }
            ]}
        };

        const Login = ({ onLogin }) => {
            const [pass, setPass] = useState('');
            const [error, setError] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (pass === MON_MOT_DE_PASSE) {
                    onLogin();
                } else {
                    setError(true);
                    setPass('');
                }
            };

            return (
                <div className="fixed inset-0 bg-green-600 flex items-center justify-center z-[100] p-6">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center animate-up border-4 border-white/20">
                        <div className="text-5xl mb-6">🔐</div>
                        <h2 className="font-black uppercase tracking-widest text-gray-800 mb-2 italic">Accès Privé</h2>
                        <p className="text-gray-400 text-xs mb-8 font-bold uppercase tracking-widest">Mon Stockage</p>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input 
                                type="password" 
                                inputMode="numeric"
                                placeholder="Mot de passe..." 
                                className={`w-full p-5 bg-gray-50 rounded-2xl border-2 outline-none font-bold text-center text-xl transition-all ${error ? 'border-red-300' : 'border-transparent focus:border-green-500'}`}
                                value={pass}
                                onChange={(e) => { setPass(e.target.value); setError(false); }}
                            />
                            {error && <p className="text-red-500 text-[10px] font-bold uppercase">Code incorrect</p>}
                            <button type="submit" className="w-full bg-black text-white p-5 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                                Connexion
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => {
                return localStorage.getItem('stock_session') === 'active';
            });

            const [produits, setProduits] = useState([]);

            // 1. CHARGER DEPUIS LA BDD AU DEMARRAGE
            useEffect(() => {
    if (isLoggedIn) {
        fetch(`${API_URL}?action=get_stock`)
            .then(res => res.json())
            .then(data => {
                // SÉCURITÉ : Si on reçoit une erreur du PHP, on met une liste vide
                if (data && Array.isArray(data)) {
                    setProduits(data);
                } else {
                    console.error("Le serveur n'a pas renvoyé une liste :", data);
                    setProduits([]); 
                }
            })
            .catch(err => {
                console.error("Erreur réseau :", err);
                setProduits([]);
            });
    }
}, [isLoggedIn]);

            // 2. FONCTION DE SAUVEGARDE SERVEUR
            const syncWithServer = async (produit) => {
                try {
                    await fetch(`${API_URL}?action=save_product`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(produit)
                    });
                } catch (err) { console.error("Erreur synchro:", err); }
            };

            const [view, setView] = useState('home');
            const [showAddModal, setShowAddModal] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [openSections, setOpenSections] = useState({});
            const [form, setForm] = useState({ nom: '', zone: 'Alimentaire', rayon: 'Fruit et légume', typeStock: 'pourcent', stock: 1, date: '', directShopping: false, congele: false });

            const handleLoginSuccess = () => {
                localStorage.setItem('stock_session', 'active');
                setIsLoggedIn(true);
            };

            const updateStock = (id, delta) => {
                const nouveauxProduits = produits.map(p => {
                    if (p.id !== id) return p;
                    let next = p.typeStock === 'pourcent' ? Number(p.stock) + (delta * 25) : Number(p.stock) + delta;
                    if (next <= 0) {
                        if (confirm(`Plus de ${p.nom} ?`)) {
                            const updated = { ...p, stock: 0, checked: false };
                            syncWithServer(updated);
                            return updated;
                        }
                        // Suppression :
                        fetch(`${API_URL}?action=delete_product&id=${id}`);
                        return null;
                    }
                    const updated = { ...p, stock: Math.max(0, p.typeStock === 'pourcent' ? Math.min(100, next) : next) };
                    syncWithServer(updated);
                    return updated;
                }).filter(Boolean);
                setProduits(nouveauxProduits);
            };

            const checkDLC = (dateStr, congele) => {
                if (!dateStr || congele) return { status: 'ok', msg: '' };
                const diff = (new Date(dateStr) - new Date()) / (1000 * 60 * 60 * 24);
                if (diff < 0) return { status: 'expired', msg: 'PÉRIMÉ' };
                if (diff <= 3) return { status: 'warning', msg: 'DLC PROCHE' };
                return { status: 'ok', msg: '' };
            };

            if (!isLoggedIn) {
                return <Login onLogin={handleLoginSuccess} />;
            }

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-32">
                    <header className="bg-white p-5 sticky top-0 z-30 border-b shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="font-black italic text-lg uppercase tracking-tight text-green-600 underline leading-none">MON STOCKAGES</h1>
                            <button onClick={() => setView(view === 'home' ? 'shopping' : 'home')} className="bg-black text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest">
                                {view === 'home' ? 'Courses' : 'Stock'}
                            </button>
                        </div>
                        {view === 'home' && (
                            <input type="text" placeholder="🔍 Rechercher un produit..." className="w-full px-4 py-3 bg-gray-100 rounded-2xl text-sm outline-none border-none focus:ring-2 focus:ring-green-500 shadow-inner" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        )}
                    </header>

                    <main className="p-4">
                        {view === 'home' ? (
                            Object.keys(STRUCTURE).map(zone => {
                                const zoneItems = produits.filter(p => p.zone === zone && Number(p.stock) > 0 && p.nom.toLowerCase().includes(searchTerm.toLowerCase()));
                                if (zoneItems.length === 0) return null;
                                return (
                                    <div key={zone} className="mb-4">
                                        <button onClick={() => setOpenSections(prev => ({...prev, [zone]: !prev[zone]}))} className="w-full flex justify-between p-4 bg-white rounded-2xl shadow-sm border border-gray-100 mb-2 font-black text-xs uppercase italic text-gray-700 tracking-wider">
                                            <span>{STRUCTURE[zone].icon} {zone}</span>
                                            <span className="opacity-30">{openSections[zone] ? '▲' : '▼'}</span>
                                        </button>
                                        {openSections[zone] && STRUCTURE[zone].rayons.map(ray => {
                                            const rayItems = zoneItems.filter(p => p.rayon === ray.id);
                                            if (rayItems.length === 0) return null;
                                            return (
                                                <div key={ray.id} className="ml-4 mb-2 bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                                                    <button onClick={() => setOpenSections(prev => ({...prev, [ray.id]: !prev[ray.id]}))} className="w-full p-2 text-[9px] font-black uppercase text-gray-400 px-4 bg-gray-50 flex justify-between border-b border-gray-100">
                                                        <span>{ray.icon} {ray.id}</span>
                                                        <span>{rayItems.length} {openSections[ray.id] ? '▲' : '▼'}</span>
                                                    </button>
                                                    {openSections[ray.id] && (
                                                        <div className="p-2 space-y-2">
                                                            {rayItems.map(p => {
                                                                const dlc = checkDLC(p.date, p.congele == 1);
                                                                return (
                                                                    <div key={p.id} className={`p-4 rounded-xl border transition-all ${dlc.status === 'warning' ? 'warning-dlc' : dlc.status === 'expired' ? 'bg-red-50 border-red-200 shadow-inner' : 'bg-white border-gray-100'}`}>
                                                                        <div className="flex justify-between items-center mb-2 text-gray-800">
                                                                            <div className="flex flex-col">
                                                                                <span className="font-bold text-sm tracking-tight">{p.nom}</span>
                                                                                {dlc.msg && <span className="text-[8px] font-black text-red-600 tracking-widest">{dlc.msg}</span>}
                                                                            </div>
                                                                            <span className="text-[10px] font-black px-2 py-1 bg-gray-100 rounded-lg">{p.typeStock === 'pourcent' ? p.stock+'%' : 'Qté: '+p.stock}</span>
                                                                        </div>
                                                                        <div className="flex justify-between items-center">
                                                                            <div className="flex items-center gap-2">
                                                                                <span className="text-[9px] text-gray-400 font-bold italic">{p.date ? '⌛ '+p.date : '♻️ Sans date'}</span>
                                                                                <button onClick={() => {
                                                                                    const updated = {...p, congele: p.congele == 1 ? 0 : 1};
                                                                                    setProduits(produits.map(i => i.id === p.id ? updated : i));
                                                                                    syncWithServer(updated);
                                                                                }} className={`text-[10px] p-1 rounded font-black ${p.congele == 1 ? 'bg-blue-500 text-white shadow-md' : 'bg-gray-200 text-gray-400'}`}>❄️</button>
                                                                            </div>
                                                                            <div className="flex gap-2">
                                                                                <button onClick={() => updateStock(p.id, -1)} className="w-10 h-10 bg-white border border-gray-200 rounded-xl font-bold active:bg-gray-100 shadow-sm transition-transform active:scale-90">-</button>
                                                                                <button onClick={() => updateStock(p.id, 1)} className="w-10 h-10 bg-white border border-gray-200 rounded-xl font-bold active:bg-gray-100 shadow-sm transition-transform active:scale-90">+</button>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                );
                            })
                        ) : (
                            <div className="bg-white rounded-[2rem] border border-gray-200 shadow-sm divide-y divide-gray-50 overflow-hidden">
                                {produits.filter(p => Number(p.stock) === 0 || p.checked == 1).length === 0 ? <p className="p-12 text-center text-gray-300 italic text-sm">Votre liste est vide.</p> :
                                produits.filter(p => Number(p.stock) === 0 || p.checked == 1).map(p => (
                                    <div key={p.id} className="flex items-center justify-between p-4 bg-white active:bg-gray-50">
                                        <div className="flex items-center gap-4 px-2">
                                            <input type="checkbox" checked={p.checked == 1} onChange={() => {
                                                const updated = {...p, checked: p.checked == 1 ? 0 : 1};
                                                setProduits(produits.map(i => i.id === p.id ? updated : i));
                                                syncWithServer(updated);
                                            }} className="w-6 h-6 accent-green-600 rounded-lg shadow-sm" />
                                            <div>
                                                <p className={`font-bold text-sm tracking-tight ${p.checked == 1 ? 'line-through opacity-20' : 'text-gray-700'}`}>{p.nom}</p>
                                                <p className="text-[8px] text-gray-400 font-black uppercase tracking-widest">{p.rayon}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => {
                                            fetch(`${API_URL}?action=delete_product&id=${p.id}`);
                                            setProduits(produits.filter(i => i.id !== p.id));
                                        }} className="text-gray-200 p-2 text-lg hover:text-red-300 transition-colors">✕</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end z-50 p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 max-w-sm mx-auto shadow-2xl overflow-y-auto max-h-[85vh] animate-up border border-white/20">
                                <h2 className="text-center font-black mb-8 uppercase text-gray-300 text-[10px] tracking-widest italic tracking-tighter">Nouvel Article</h2>
                                <input type="text" placeholder="Nom du produit..." className="w-full p-4 bg-gray-50 rounded-2xl mb-4 border-none outline-none font-bold text-lg shadow-inner focus:ring-2 focus:ring-green-500 transition-all" value={form.nom} onChange={e => setForm({...form, nom: e.target.value})} />
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[10px] font-bold shadow-sm outline-none" value={form.zone} onChange={e => setForm({...form, zone: e.target.value, rayon: STRUCTURE[e.target.value].rayons[0].id})}>
                                        {Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{z}</option>)}
                                    </select>
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[10px] font-bold shadow-sm outline-none" value={form.rayon} onChange={e => setForm({...form, rayon: e.target.value})}>
                                        {STRUCTURE[form.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.id}</option>)}
                                    </select>
                                </div>
                                <div className="flex gap-2 mb-4 bg-gray-100 p-1.5 rounded-2xl shadow-inner">
                                    <button onClick={() => setForm({...form, typeStock: 'pourcent'})} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${form.typeStock === 'pourcent' ? 'bg-white shadow-md text-black scale-105' : 'text-gray-400'}`}>% Contenant</button>
                                    <button onClick={() => setForm({...form, typeStock: 'unite'})} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${form.typeStock === 'unite' ? 'bg-white shadow-md text-black scale-105' : 'text-gray-400'}`}>123 Unité</button>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    <input type="date" className="p-3 bg-white border border-gray-100 rounded-xl text-[10px] font-bold shadow-sm outline-none" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                    {form.typeStock === 'unite' && <input type="number" placeholder="Qté" className="p-3 bg-white border border-gray-100 rounded-xl text-[10px] font-bold shadow-sm outline-none" value={form.stock} onChange={e => setForm({...form, stock: Number(e.target.value)})} />}
                                </div>
                                <label className="flex items-center gap-4 mb-4 p-5 bg-blue-50/50 rounded-[1.5rem] cursor-pointer border-2 border-dashed border-blue-100 active:scale-95 transition-all">
                                    <input type="checkbox" checked={form.congele} onChange={e => setForm({...form, congele: e.target.checked})} className="w-6 h-6 accent-blue-600 rounded-lg shadow-sm border-none outline-none" />
                                    <span className="text-[10px] font-black text-blue-800 uppercase italic tracking-tighter">Placé au congélateur ❄️</span>
                                </label>
                                <label className="flex items-center gap-4 mb-8 p-5 bg-red-50/50 rounded-[1.5rem] cursor-pointer border-2 border-dashed border-red-100 active:scale-95 transition-all">
                                    <input type="checkbox" checked={form.directShopping} onChange={e => setForm({...form, directShopping: e.target.checked})} className="w-6 h-6 accent-red-500 rounded-lg shadow-sm border-none outline-none" />
                                    <span className="text-[10px] font-black text-red-700 uppercase italic tracking-tighter leading-tight">Ajouter directement en courses 🛒</span>
                                </label>
                                <div className="space-y-3">
                                    <button onClick={() => {
                                        const icon = STRUCTURE[form.zone].rayons.find(r => r.id === form.rayon).icon;
                                        const nouvelleQte = form.directShopping ? 0 : (form.typeStock === 'pourcent' ? 100 : Number(form.stock));
                                        let updatedProduit;
                                        const indexExistant = produits.findIndex(p => p.nom.toLowerCase() === form.nom.toLowerCase() && p.date === form.date && p.rayon === form.rayon && p.typeStock === 'unite' && form.typeStock === 'unite');
                                        
                                        if (indexExistant !== -1 && !form.directShopping) {
                                            const nouveauStock = [...produits];
                                            nouveauStock[indexExistant].stock = Number(nouveauStock[indexExistant].stock) + nouvelleQte;
                                            updatedProduit = nouveauStock[indexExistant];
                                            setProduits(nouveauStock);
                                        } else {
                                            updatedProduit = { ...form, id: Date.now(), icon, stock: nouvelleQte, checked: 0 };
                                            setProduits([updatedProduit, ...produits]);
                                        }
                                        syncWithServer(updatedProduit); // Sauvegarde BDD
                                        setShowAddModal(false);
                                        setForm({ nom: '', zone: 'Alimentaire', rayon: 'Fruit et légume', typeStock: 'pourcent', stock: 1, date: '', directShopping: false, congele: false });
                                    }} className="w-full bg-green-600 text-white p-5 rounded-[2rem] font-black shadow-xl uppercase tracking-[0.2em] text-sm active:scale-95 transition-all">Enregistrer</button>
                                    <button onClick={() => { setShowAddModal(false); setForm({ nom: '', zone: 'Alimentaire', rayon: 'Fruit et légume', typeStock: 'pourcent', stock: 1, date: '', directShopping: false, congele: false }); }} className="w-full text-gray-300 text-[10px] font-black uppercase tracking-widest text-center py-2 active:text-red-400 transition-colors">Annuler</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 backdrop-blur-md border border-gray-100 p-2 rounded-[2.5rem] flex justify-around items-center shadow-2xl z-40">
                        <button onClick={() => setView('home')} className={`p-4 transition-all duration-300 ${view === 'home' ? 'text-green-600 scale-125' : 'text-gray-200 opacity-40'}`}>🏠</button>
                        <button onClick={() => setShowAddModal(true)} className="bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-xl active:scale-75 transition-all font-light tracking-tighter">＋</button>
                        <button onClick={() => setView('shopping')} className={`p-4 transition-all duration-300 ${view === 'shopping' ? 'text-green-600 scale-125' : 'text-gray-200 opacity-40'}`}>🛒</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
