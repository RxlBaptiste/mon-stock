<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/manifest+json,{'display':'standalone','name':'Mon Stock Pro','short_name':'Stock','start_url':'/','background_color':'#ffffff','theme_color':'#22c55e'}" />
    
    <title>Mon Stock Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { touch-action: manipulation; font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STRUCTURE = {
            "Alimentaire": {
                icon: "🍎",
                rayons: [
                    { id: "Fruits & Légumes", icon: "🧺" }, // Ton icône personnalisée
                    { id: "Produits Frais", icon: "🧀" },
                    { id: "Surgelés", icon: "❄️" },
                    { id: "Épicerie Salée", icon: "🧂" },
                    { id: "Épicerie Sucrée", icon: "🍪" },
                    { id: "Boulangerie", icon: "🥖" },
                    { id: "Boissons", icon: "🍷" }
                ]
            },
            "Hygiène & Santé": {
                icon: "✨",
                rayons: [
                    { id: "Hygiène Corporelle", icon: "🧼" },
                    { id: "Soin & Beauté", icon: "💄" },
                    { id: "Hygiène Papier", icon: "🧻" },
                    { id: "Parapharmacie", icon: "🩹" },
                    { id: "Bébé", icon: "👶" }
                ]
            },
            "Entretien & Maison": {
                icon: "🏠",
                rayons: [
                    { id: "Entretien", icon: "🧹" },
                    { id: "Droguerie", icon: "🔋" },
                    { id: "Arts de la table", icon: "🍽️" },
                    { id: "Linge", icon: "🛌" }
                ]
            }
        };

        const App = () => {
            const [produits, setProduits] = useState(() => {
                const saved = localStorage.getItem('mon_stock_v8');
                return saved ? JSON.parse(saved) : [];
            });

            const [view, setView] = useState('home');
            const [showAddModal, setShowAddModal] = useState(false);
            const [openSections, setOpenSections] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            
            const [form, setForm] = useState({ 
                nom: '', zone: 'Alimentaire', rayon: 'Produits Frais', 
                typeStock: 'pourcent', stock: 1, date: '', directShopping: false 
            });

            useEffect(() => {
                localStorage.setItem('mon_stock_v8', JSON.stringify(produits));
            }, [produits]);

            // Force l'ouverture des sections si on recherche quelque chose
            useEffect(() => {
                if (searchTerm.length > 0) {
                    const newOpens = {};
                    Object.keys(STRUCTURE).forEach(z => {
                        newOpens[z] = true;
                        STRUCTURE[z].rayons.forEach(r => newOpens[r.id] = true);
                    });
                    setOpenSections(newOpens);
                }
            }, [searchTerm]);

            const updateStock = (id, delta) => {
                setProduits(produits.map(p => {
                    if (p.id !== id) return p;
                    let next = p.typeStock === 'pourcent' ? p.stock + (delta * 25) : p.stock + delta;
                    if (next <= 0) {
                        return confirm(`Plus de ${p.nom}. Mettre en liste ?`) ? { ...p, stock: 0, checked: false } : null;
                    }
                    return { ...p, stock: Math.max(0, p.typeStock === 'pourcent' ? Math.min(100, next) : next) };
                }).filter(Boolean));
            };

            const ajouterNouveau = () => {
                if (!form.nom) return;
                const rayonIcon = STRUCTURE[form.zone].rayons.find(r => r.id === form.rayon).icon;
                const p = { 
                    ...form, 
                    id: Date.now(), 
                    icon: rayonIcon,
                    stock: form.directShopping ? 0 : (form.typeStock === 'pourcent' ? 100 : form.stock),
                    checked: false
                };
                setProduits([p, ...produits]);
                setShowAddModal(false);
                setForm({ nom: '', zone: 'Alimentaire', rayon: 'Produits Frais', typeStock: 'pourcent', stock: 1, date: '', directShopping: false });
            };

            const validateShopping = () => {
                setProduits(produits.map(p => {
                    if (!p.checked) return p;
                    const qte = p.typeStock === 'unite' ? (parseInt(prompt(`Qté pour ${p.nom} ?`, "1")) || 1) : 100;
                    const d = prompt(`Date de péremption ?`, "");
                    return { ...p, stock: qte, checked: false, date: d };
                }));
            };

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-28 shadow-xl">
                    <header className="bg-white p-5 sticky top-0 z-30 border-b shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="font-black text-lg text-gray-800 italic uppercase tracking-tighter">
                                {view === 'home' ? '🏠 Mon Stock' : '🛒 Courses'}
                            </h1>
                            <button onClick={() => setView(view === 'home' ? 'shopping' : 'home')} className="bg-black text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase">
                                {view === 'home' ? 'Liste' : 'Stock'}
                            </button>
                        </div>
                        
                        {/* BARRE DE RECHERCHE DANS LE STOCK */}
                        {view === 'home' && (
                            <div className="relative">
                                <span className="absolute left-4 top-3 text-gray-400">🔍</span>
                                <input 
                                    type="text" 
                                    placeholder="Rechercher un produit..." 
                                    className="w-full pl-10 pr-4 py-3 bg-gray-100 rounded-2xl text-sm font-medium border-none focus:ring-2 focus:ring-green-500 outline-none transition-all"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                {searchTerm && (
                                    <button onClick={() => setSearchTerm('')} className="absolute right-4 top-3 text-gray-400 font-bold">✕</button>
                                )}
                            </div>
                        )}
                    </header>

                    {view === 'home' && (
                        <div className="p-4 space-y-3">
                            {Object.keys(STRUCTURE).map(zone => {
                                const zoneItems = produits.filter(p => 
                                    p.zone === zone && 
                                    p.stock > 0 && 
                                    p.nom.toLowerCase().includes(searchTerm.toLowerCase())
                                );
                                if (zoneItems.length === 0) return null;
                                
                                return (
                                    <div key={zone}>
                                        <button onClick={() => setOpenSections(prev => ({...prev, [zone]: !prev[zone]}))} className="w-full flex justify-between p-4 bg-white rounded-2xl shadow-sm border mb-2 font-bold text-sm">
                                            <span>{STRUCTURE[zone].icon} {zone}</span>
                                            <span className="opacity-20">{openSections[zone] ? '▲' : '▼'}</span>
                                        </button>
                                        {openSections[zone] && (
                                            <div className="pl-4 space-y-2 mb-4">
                                                {STRUCTURE[zone].rayons.map(ray => {
                                                    const rayItems = zoneItems.filter(p => p.rayon === ray.id);
                                                    if (rayItems.length === 0) return null;
                                                    return (
                                                        <div key={ray.id} className="bg-white/50 rounded-xl border overflow-hidden">
                                                            <button onClick={() => setOpenSections(prev => ({...prev, [ray.id]: !prev[ray.id]}))} className="w-full p-2 text-[10px] font-black uppercase text-gray-400 flex justify-between items-center px-4 bg-white/40">
                                                                <span>{ray.icon} {ray.id}</span>
                                                                <span>{rayItems.length}</span>
                                                            </button>
                                                            {openSections[ray.id] && (
                                                                <div className="p-2 space-y-2 bg-white">
                                                                    {rayItems.map(p => (
                                                                        <div key={p.id} className="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                                                            <div className="flex justify-between items-center mb-2">
                                                                                <span className="font-bold text-sm text-gray-800">{p.nom}</span>
                                                                                <span className={`text-[10px] font-black px-2 py-1 rounded-lg ${p.stock <= (p.typeStock === 'pourcent' ? 25 : 1) ? 'bg-red-100 text-red-500' : 'bg-green-100 text-green-600'}`}>
                                                                                    {p.typeStock === 'pourcent' ? p.stock+'%' : 'Qté: '+p.stock}
                                                                                </span>
                                                                            </div>
                                                                            <div className="flex justify-between items-center">
                                                                                <span className="text-[10px] text-gray-400 font-bold">{p.date ? '⌛ '+p.date : '♻️ Pas de date'}</span>
                                                                                <div className="flex gap-2">
                                                                                    <button onClick={() => updateStock(p.id, -1)} className="w-10 h-10 bg-white border rounded-xl font-bold shadow-sm active:scale-95 transition-transform">-</button>
                                                                                    <button onClick={() => updateStock(p.id, 1)} className="w-10 h-10 bg-white border rounded-xl font-bold shadow-sm active:scale-95 transition-transform">+</button>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                            {produits.filter(p => p.stock > 0).length > 0 && 
                             Object.keys(STRUCTURE).every(z => produits.filter(p => p.zone === z && p.stock > 0 && p.nom.toLowerCase().includes(searchTerm.toLowerCase())).length === 0) && (
                                <p className="text-center text-gray-400 py-10 italic">Aucun produit ne correspond à "{searchTerm}"</p>
                            )}
                        </div>
                    )}

                    {view === 'shopping' && (
                        <div className="p-4">
                            <div className="bg-white rounded-2xl border shadow-sm divide-y">
                                {produits.filter(p => p.stock === 0 || p.checked).length === 0 ? (
                                    <p className="p-10 text-center text-gray-300 italic text-sm">Votre liste est vide.</p>
                                ) : (
                                    produits.filter(p => p.stock === 0 || p.checked).map(p => (
                                        <div key={p.id} className="flex items-center justify-between p-4">
                                            <div className="flex items-center gap-3">
                                                <input type="checkbox" checked={p.checked} onChange={() => setProduits(produits.map(i => i.id === p.id ? {...i, checked: !i.checked} : i))} className="w-6 h-6 rounded-xl accent-black" />
                                                <div>
                                                    <p className={`font-bold text-sm ${p.checked ? 'line-through opacity-30' : ''}`}>{p.nom}</p>
                                                    <p className="text-[9px] text-gray-400 font-black uppercase tracking-tighter">{p.rayon}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => setProduits(produits.filter(i => i.id !== p.id))} className="text-gray-200 p-2 text-xl">✕</button>
                                        </div>
                                    ))
                                )}
                            </div>
                            {produits.some(p => p.checked) && (
                                <button onClick={validateShopping} className="w-full mt-6 bg-green-500 text-white p-5 rounded-[2rem] font-black shadow-xl uppercase text-sm tracking-widest active:scale-95 transition-all">Valider les achats 🛒</button>
                            )}
                        </div>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-end z-50 p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 max-w-sm mx-auto shadow-2xl animate-up overflow-y-auto max-h-[85vh]">
                                <h2 className="text-center font-black mb-6 uppercase text-gray-300 text-[10px] tracking-widest italic">Nouveau Produit</h2>
                                
                                <input type="text" placeholder="Nom du produit..." className="w-full p-4 bg-gray-50 rounded-2xl mb-4 border outline-none font-bold text-lg" value={form.nom} onChange={e => setForm({...form, nom: e.target.value})} />
                                
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-gray-400 uppercase ml-2 italic">Zone</label>
                                        <select className="w-full p-3 bg-white border rounded-xl text-[10px] font-bold" value={form.zone} onChange={e => setForm({...form, zone: e.target.value, rayon: STRUCTURE[e.target.value].rayons[0].id})}>
                                            {Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{STRUCTURE[z].icon} {z}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-gray-400 uppercase ml-2 italic">Rayon</label>
                                        <select className="w-full p-3 bg-white border rounded-xl text-[10px] font-bold" value={form.rayon} onChange={e => setForm({...form, rayon: e.target.value})}>
                                            {STRUCTURE[form.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.icon} {r.id}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <div className="flex gap-2 mb-4 bg-gray-100 p-1 rounded-xl">
                                    <button onClick={() => setForm({...form, typeStock: 'pourcent'})} className={`flex-1 py-2 rounded-lg text-[10px] font-black uppercase ${form.typeStock === 'pourcent' ? 'bg-white shadow-sm' : 'text-gray-400'}`}>% Contenant</button>
                                    <button onClick={() => setForm({...form, typeStock: 'unite'})} className={`flex-1 py-2 rounded-lg text-[10px] font-black uppercase ${form.typeStock === 'unite' ? 'bg-white shadow-sm' : 'text-gray-400'}`}>123 Unité</button>
                                </div>
                                
                                <div className="mb-4">
                                    <label className="text-[9px] font-black text-gray-400 uppercase ml-2 italic">Date de péremption</label>
                                    <input type="date" className="w-full p-3 bg-white border rounded-xl text-xs font-bold" onChange={e => setForm({...form, date: e.target.value})} />
                                </div>

                                {form.typeStock === 'unite' && (
                                    <div className="mb-4 animate-up">
                                        <label className="text-[9px] font-black text-gray-400 uppercase ml-2 italic">Quantité initiale</label>
                                        <input type="number" className="w-full p-3 bg-white border rounded-xl text-xs font-bold" value={form.stock} onChange={e => setForm({...form, stock: parseInt(e.target.value) || 1})} />
                                    </div>
                                )}

                                <label className="flex items-center gap-4 mb-6 p-4 bg-red-50 rounded-2xl border-2 border-dashed border-red-100 active:scale-95 transition-transform">
                                    <input type="checkbox" checked={form.directShopping} onChange={e => setForm({...form, directShopping: e.target.checked})} className="w-6 h-6 accent-red-500 rounded-lg" />
                                    <span className="text-[10px] font-black text-red-700 uppercase leading-tight italic">Direct en liste de courses</span>
                                </label>

                                <button onClick={ajouterNouveau} className="w-full bg-black text-white p-5 rounded-3xl font-black shadow-xl mb-4 uppercase tracking-widest text-sm">Enregistrer</button>
                                <button onClick={() => setShowAddModal(false)} className="w-full text-gray-300 text-[10px] font-black uppercase tracking-widest text-center">Annuler</button>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 backdrop-blur-md border border-white/20 p-2 rounded-[2.5rem] flex justify-around items-center shadow-2xl z-40">
                        <button onClick={() => { setView('home'); setSearchTerm(''); }} className={`p-4 transition-all ${view === 'home' ? 'text-black scale-125' : 'text-gray-200'}`}>🏠</button>
                        <button onClick={() => setShowAddModal(true)} className="bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-2xl active:scale-90 transition-all">＋</button>
                        <button onClick={() => setView('shopping')} className={`p-4 transition-all ${view === 'shopping' ? 'text-black scale-125' : 'text-gray-200'}`}>🛒</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
