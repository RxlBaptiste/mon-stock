<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#22c55e">
    <title>Mon Stockage Pro - Intelligent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { touch-action: manipulation; font-family: sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-orange { 0%, 100% { background-color: #fff; } 50% { background-color: #fff7ed; } }
        .warning-dlc { animation: pulse-orange 2s infinite; border-left: 5px solid #fb923c !important; }
        .expired-dlc { background-color: #fef2f2; border-left: 5px solid #ef4444 !important; }
        .animate-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #barcode-ui video { width: 100%; height: 100%; object-fit: cover; border-radius: 2rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = "https://baptisterouxel.fr/stock/api.php";
        const { useState, useEffect, useRef } = React;

        // --- BASE DE DONNÉES DE DURÉE DE VIE (en jours) ---
        const FRUIT_LIFESPAN = {
            // Très fragiles (1-3 jours)
            "FRAISE": 2, "FRAMBOISE": 2, "MURE": 2, "MYRTILLE": 3, "CERISE": 3, "SALADE": 3, "CHAMPIGNON": 3, "EPINARD": 2, "ASPERGE": 3,
            // Moyens (4-7 jours)
            "POIRE": 7, "TOMATE": 7, "BANANE": 5, "AVOCAT": 4, "PECHE": 5, "NECTARINE": 5, "ABRICOT": 4, "PRUNE": 6, "COURGETTE": 6, "AUBERGINE": 6, "POIVRON": 7, "CONCOMBRE": 6, "HARICOT VERT": 5, "BROCOLI": 5,
            // Robustes (10 jours +)
            "POMME": 21, "ORANGE": 14, "CITRON": 20, "PAMPLEMOUSSE": 15, "MELON": 10, "PASTEQUE": 10, "POMME DE TERRE": 30, "OIGNON": 30, "AIL": 60, "CAROTTE": 20, "CHOU-FLEUR": 12, "CHOU": 15, "RADIS": 10, "KIWI": 15
        };

        const STRUCTURE = {
            "Alimentaire": { icon: "🧺", rayons: [
                { id: "Fruits et Légumes", icon: "🍎" }, { id: "Viande", icon: "🥩" }, { id: "Poisson", icon: "🐟" },
                { id: "Produits Laitiers", icon: "🥛" }, { id: "Salé", icon: "🧂" }, { id: "Sucré", icon: "🍪" }, 
                { id: "Condiments", icon: "🍯" }, { id: "Boissons", icon: "🍷" }, { id: "Surgelés", icon: "❄️" }, { id: "Boulangerie", icon: "🥖" }
            ]},
            "Hygiène": { icon: "✨", rayons: [
                { id: "Hygiène Corporelle", icon: "🧼" }, { id: "Hygiène Dentaire", icon: "🪥" }, 
                { id: "Produits Ménagers", icon: "🧹" }, { id: "Papier", icon: "🧻" }, { id: "Lessive", icon: "🧺" }
            ]},
            "Divers": { icon: "📦", rayons: [
                { id: "Pharmacie", icon: "🩹" }, { id: "Animaux", icon: "🐾" }, { id: "Bricolage", icon: "🛠️" }, { id: "Autres", icon: "🌀" }
            ]}
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('stock_session') === 'active');
            const [produits, setProduits] = useState([]);
            const [view, setView] = useState('home'); 
            const [loading, setLoading] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState({ show: false, produit: null });
            const [searchTerm, setSearchTerm] = useState('');
            const [openSections, setOpenSections] = useState({});
            const [form, setForm] = useState({ nom: '', zone: 'Alimentaire', rayon: 'Fruits et Légumes', typeStock: 'unite', stock: 1, date: '', congele: false, maturite: '' });
            const [isScanningBarcode, setIsScanningBarcode] = useState(false);
            const currentUser = localStorage.getItem('stock_user') || 'baptiste';

            useEffect(() => { if (isLoggedIn) refreshStock(); }, [isLoggedIn, currentUser]);

            const refreshStock = () => {
                fetch(`${API_URL}?action=get_stock&user=${currentUser}`)
                    .then(res => res.json())
                    .then(data => setProduits(Array.isArray(data) ? data : []))
                    .catch(() => setProduits([]));
            };

            const formatFR = (dateStr) => {
                if (!dateStr || !dateStr.includes('-')) return dateStr || 'SANS DATE';
                const [y, m, d] = dateStr.split('-');
                return `${d}/${m}/${y}`;
            };

            const checkDLCStatus = (dateStr) => {
                if (!dateStr) return "";
                const today = new Date();
                const dlc = new Date(dateStr);
                const diff = (dlc - today) / (1000 * 3600 * 24);
                if (diff < 0) return "expired-dlc";
                if (diff <= 3) return "warning-dlc";
                return "";
            };

            const syncWithServer = async (p) => {
                try { 
                    await fetch(`${API_URL}?action=save_product&user=${currentUser}`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify(p) 
                    }); 
                } catch (err) { console.error("Erreur Sync:", err); }
            };

            const updateStock = (id, delta) => {
                const newP = produits.map(p => {
                    if (p.id !== id) return p;
                    let next = Number(p.stock) + (p.typeStock === 'pourcent' ? delta * 25 : delta);
                    if (next <= 0 && delta < 0) { setConfirmDelete({ show: true, produit: p }); return p; }
                    const u = { ...p, stock: Math.max(0, p.typeStock === 'pourcent' ? Math.min(100, next) : next) };
                    syncWithServer(u); return u;
                });
                setProduits(newP);
            };

            // --- LOGIQUE MATURITÉ ---
            const handleMaturity = (nom, etatIndex) => {
                const baseLife = FRUIT_LIFESPAN[nom.toUpperCase()] || 5;
                const coeffs = [1.5, 1.0, 0.5]; // Pas mûr, Bientôt mûr, Mûr
                const etats = ["Pas mûr", "Bientôt mûr", "Mûr"];
                const jours = Math.round(baseLife * coeffs[etatIndex]);
                const d = new Date();
                d.setDate(d.getDate() + jours);
                setForm({ ...form, nom: nom.toUpperCase(), date: d.toISOString().split('T')[0], maturite: etats[etatIndex] });
            };

            if (!isLoggedIn) return (
                <div className="fixed inset-0 bg-green-600 flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl">
                        <form onSubmit={(e) => { 
                            e.preventDefault(); 
                            const pass = e.target.p.value; 
                            const users = {"CeciEstMonMotDePasseStock_22":'baptiste',"1912":'soeur',"5678":'pere'}; 
                            if(users[pass]){ localStorage.setItem('stock_user',users[pass]); localStorage.setItem('stock_session','active'); setIsLoggedIn(true); }
                        }} className="space-y-4">
                            <h2 className="font-black uppercase text-center mb-4 text-gray-800 tracking-tighter">Mon Stockage</h2>
                            <input name="p" type="password" inputMode="numeric" placeholder="Code secret..." className="w-full p-5 bg-gray-50 rounded-2xl border-2 text-center text-xl outline-none focus:border-green-500" />
                            <button type="submit" className="w-full bg-black text-white p-5 rounded-2xl font-black uppercase active:scale-95 transition-all">Entrer</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="bg-white p-5 sticky top-0 z-30 border-b shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="font-black italic text-lg uppercase text-green-600 underline">STOCK PRO</h1>
                            <button onClick={() => setView(view === 'home' ? 'shopping' : 'home')} className="bg-black text-white px-4 py-2 rounded-xl text-[9px] font-bold uppercase shadow-sm active:scale-95">
                                {view === 'home' ? '🛒 Courses' : '🏠 Stock'}
                            </button>
                        </div>
                        {view === 'home' && <input type="text" placeholder="🔍 Rechercher..." className="w-full px-4 py-3 bg-gray-100 rounded-2xl text-sm outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />}
                    </header>

                    <main className="p-4">
                        {view === 'home' && Object.keys(STRUCTURE).map(zone => {
                            const zItems = produits.filter(p => p.zone === zone && Number(p.stock) > 0 && p.nom.toLowerCase().includes(searchTerm.toLowerCase()));
                            if (zItems.length === 0) return null;
                            return (
                                <div key={zone} className="mb-4">
                                    <button onClick={() => setOpenSections(prev => ({...prev, [zone]: !prev[zone]}))} className="w-full flex justify-between p-4 bg-white rounded-2xl shadow-sm font-black text-[10px] uppercase text-gray-400 tracking-widest">
                                        <span>{STRUCTURE[zone].icon} {zone}</span>
                                        <span>{openSections[zone] ? '▲' : '▼'}</span>
                                    </button>
                                    {openSections[zone] && STRUCTURE[zone].rayons.map(ray => {
                                        const rItems = zItems.filter(p => p.rayon === ray.id);
                                        if (rItems.length === 0) return null;
                                        return (
                                            <div key={ray.id} className="ml-2 mt-2 bg-white rounded-2xl shadow-sm border border-gray-50 overflow-hidden mb-2 animate-up">
                                                <div className="p-3 px-5 bg-gray-50/50 text-[9px] font-black uppercase text-gray-400 border-b flex justify-between">
                                                    <span>{ray.icon} {ray.id}</span>
                                                    <span>{rItems.length}</span>
                                                </div>
                                                {rItems.map(p => (
                                                    <div key={p.id} className={`p-4 flex justify-between items-center border-b border-gray-50 last:border-none ${checkDLCStatus(p.date)}`}>
                                                        <div className="flex flex-col">
                                                            <span className="font-bold text-sm text-gray-800 uppercase leading-none mb-1">{p.nom}</span>
                                                            <span className="text-[9px] text-gray-400 italic font-bold uppercase">{formatFR(p.date)} {p.congele == 1 ? '❄️' : ''}</span>
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-[10px] font-black bg-gray-100 px-2 py-1 rounded-lg mr-1">{p.typeStock === 'pourcent' ? p.stock+'%' : 'x'+p.stock}</span>
                                                            <button onClick={() => updateStock(p.id, -1)} className="w-9 h-9 bg-white border border-gray-200 rounded-xl font-bold shadow-sm active:scale-90">-</button>
                                                            <button onClick={() => updateStock(p.id, 1)} className="w-9 h-9 bg-white border border-gray-200 rounded-xl font-bold shadow-sm active:scale-90">+</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })}
                                </div>
                            );
                        })}

                        {view === 'shopping' && (
                            <div className="bg-white rounded-[2.5rem] shadow-sm divide-y divide-gray-100 overflow-hidden animate-up">
                                {produits.filter(p => Number(p.stock) === 0).length === 0 ? <p className="p-16 text-center text-gray-300 italic text-[10px] uppercase font-black">Liste vide</p> :
                                    produits.filter(p => Number(p.stock) === 0).map(p => (
                                        <div key={p.id} className="flex items-center justify-between p-5 px-6">
                                            <div className="flex items-center gap-4">
                                                <input type="checkbox" className="w-6 h-6 accent-green-600" onChange={() => updateStock(p.id, 1)} />
                                                <span className="font-bold text-sm text-gray-700 uppercase">{p.nom}</span>
                                            </div>
                                            <button onClick={() => { fetch(`${API_URL}?action=delete_product&id=${p.id}&user=${currentUser}`); setProduits(produits.filter(i => i.id !== p.id)); }} className="text-gray-300">✕</button>
                                        </div>
                                    ))
                                }
                            </div>
                        )}
                    </main>

                    {/* MODALE AJOUT */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end z-[60] p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 max-w-sm mx-auto animate-up shadow-2xl">
                                <h2 className="text-center font-black mb-6 uppercase text-gray-400 text-[10px] tracking-widest">Nouveau Produit</h2>
                                <input type="text" placeholder="NOM DU PRODUIT..." className="w-full p-4 bg-gray-50 rounded-2xl mb-4 font-bold text-sm outline-none border-2 border-transparent focus:border-green-500" value={form.nom} onChange={e => setForm({...form, nom: e.target.value.toUpperCase()})} />
                                
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold uppercase" value={form.zone} onChange={e => setForm({...form, zone: e.target.value, rayon: STRUCTURE[e.target.value].rayons[0].id})}>
                                        {Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{z}</option>)}
                                    </select>
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold uppercase" value={form.rayon} onChange={e => setForm({...form, rayon: e.target.value})}>
                                        {STRUCTURE[form.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.id}</option>)}
                                    </select>
                                </div>

                                {/* SECTION DLC INTELLIGENTE */}
                                <div className="mb-6">
                                    {form.rayon === "Fruits et Légumes" ? (
                                        <div className="space-y-2">
                                            <p className="text-[8px] font-black text-gray-400 uppercase ml-1">État de maturité :</p>
                                            <div className="flex gap-1">
                                                {["Pas mûr", "Bientôt", "Mûr"].map((label, idx) => (
                                                    <button key={label} onClick={() => handleMaturity(form.nom, idx)} className={`flex-1 py-3 rounded-xl text-[8px] font-black uppercase transition-all border-2 ${form.maturite === (idx===0?"Pas mûr":idx===1?"Bientôt mûr":"Mûr") ? 'bg-orange-500 border-orange-600 text-white shadow-lg' : 'bg-gray-50 border-transparent text-gray-400'}`}>
                                                        {label}
                                                    </button>
                                                ))}
                                            </div>
                                            {form.date && <p className="text-center text-[9px] font-bold text-orange-600 animate-pulse">PRÉVU JUSQU'AU : {formatFR(form.date)}</p>}
                                        </div>
                                    ) : (
                                        <div className="space-y-2">
                                            <p className="text-[8px] font-black text-gray-400 uppercase ml-1">Date de péremption :</p>
                                            <input type="date" className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                        </div>
                                    )}
                                </div>

                                <button onClick={async () => { 
                                    const n={...form,id:Date.now(),stock:Number(form.stock),congele:form.congele?1:0}; 
                                    setProduits([n,...produits]); await syncWithServer(n); setShowAddModal(false); 
                                    setForm({nom:'',zone:'Alimentaire',rayon:'Fruits et Légumes',typeStock:'unite',stock:1,date:'',congele:false,maturite:''}); 
                                }} className="w-full bg-green-600 text-white p-5 rounded-[2.5rem] font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Enregistrer ✅</button>
                                <button onClick={() => setShowAddModal(false)} className="w-full text-gray-300 text-[10px] font-black uppercase mt-4">Annuler</button>
                            </div>
                        </div>
                    )}

                    {/* MODALE SUPPRESSION */}
                    {confirmDelete.show && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[110] p-6 text-center">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl animate-up">
                                <h3 className="font-black uppercase text-sm mb-2 text-gray-800">Plus de stock !</h3>
                                <p className="text-gray-400 text-[10px] mb-8 uppercase font-bold">Ajouter {confirmDelete.produit?.nom} à la liste ?</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => { const p=confirmDelete.produit; const u={...p,stock:0}; setProduits(produits.map(i=>i.id===p.id?u:i)); syncWithServer(u); setConfirmDelete({show:false,produit:null}); }} className="w-full bg-green-600 text-white p-4 rounded-2xl font-black uppercase text-[10px]">Oui, en courses 🛒</button>
                                    <button onClick={() => { const p=confirmDelete.produit; fetch(`${API_URL}?action=delete_product&id=${p.id}&user=${currentUser}`); setProduits(produits.filter(i=>i.id!==p.id)); setConfirmDelete({show:false,produit:null}); }} className="w-full bg-gray-100 text-gray-400 p-4 rounded-2xl font-black uppercase text-[10px]">Supprimer</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 backdrop-blur-md p-2 rounded-[2.5rem] flex justify-around items-center shadow-2xl z-40 border border-gray-100">
                        <button onClick={() => setView('home')} className={`p-4 transition-all ${view==='home'?'text-green-600 scale-125':'text-gray-200'}`}>🏠</button>
                        <button onClick={() => setShowAddModal(true)} className="bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-xl active:scale-75 transition-all">＋</button>
                        <button onClick={() => setView('shopping')} className={`p-4 transition-all ${view==='shopping'?'text-green-600 scale-125':'text-gray-200'}`}>🛒</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
