<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#22c55e">
    <title>Mon Stockage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { touch-action: manipulation; font-family: sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-orange { 0%, 100% { background-color: #fff; } 50% { background-color: #fff7ed; } }
        .warning-dlc { animation: pulse-orange 2s infinite; border-left: 5px solid #fb923c !important; }
        .frozen-style { border-left: 5px solid #3b82f6 !important; background-color: #eff6ff; }
        .animate-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = "https://baptisterouxel.fr/stock/api.php";
        const { useState, useEffect, useRef } = React;
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

        const FRUIT_LIFESPAN = {
            "FRAISE": 2, "FRAMBOISE": 2, "MURE": 2, "MYRTILLE": 3, "SALADE": 3, "CHAMPIGNON": 3,
            "POIRE": 7, "TOMATE": 7, "BANANE": 5, "AVOCAT": 4, "POMME": 21, "ORANGE": 14, "CITRON": 20,
            "POMME DE TERRE": 30, "OIGNON": 30, "AIL": 60, "CAROTTE": 20
        };

        const STRUCTURE = {
            Alimentaire: { icon: "🧺", rayons: [
                { id: "Fruits et Légumes", icon: "🍎" }, { id: "Viande", icon: "🥩" }, { id: "Poisson", icon: "🐟" },
                { id: "Produits Laitiers", icon: "🥛" }, { id: "Salé", icon: "🧂" }, { id: "Sucré", icon: "🍪" },
                { id: "Condiments", icon: "🍯" }, { id: "Boissons", icon: "🍷" }, { id: "Surgelés", icon: "❄️" }, { id: "Boulangerie", icon: "🥖" }
            ]},
            Hygiène: { icon: "✨", rayons: [
                { id: "Hygiène Corporelle", icon: "🧼" }, { id: "Hygiène Dentaire", icon: "🪥" },
                { id: "Produits Ménagers", icon: "🧹" }, { id: "Papier", icon: "🧻" }, { id: "Lessive", icon: "🧺" }
            ]},
            Divers: { icon: "📦", rayons: [
                { id: "Pharmacie", icon: "🩹" }, { id: "Animaux", icon: "🐾" }, { id: "Bricolage", icon: "🛠️" }, { id: "Autres", icon: "🌀" }
            ]}
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem("stock_session") === "active");
            const [produits, setProduits] = useState([]);
            const [view, setView] = useState("home");
            const [loading, setLoading] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState({ show: false, produit: null });
            const [searchTerm, setSearchTerm] = useState("");
            const [openSections, setOpenSections] = useState({});
            const [form, setForm] = useState({ nom: "", zone: "Alimentaire", rayon: "Fruits et Légumes", typeStock: "unite", stock: 1, date: "", congele: false, maturite: "" });
            const [receiptItems, setReceiptItems] = useState([]);
            const currentUser = localStorage.getItem("stock_user") || "baptiste";

            useEffect(() => { if (isLoggedIn) refreshStock(); }, [isLoggedIn, currentUser]);

            const refreshStock = () => {
                fetch(`${API_URL}?action=get_stock&user=${currentUser}`)
                    .then(res => res.json())
                    .then(data => setProduits(Array.isArray(data) ? data : []))
                    .catch(() => setProduits([]));
            };

            const formatFR = (dateStr) => {
                if (!dateStr || !dateStr.includes("-")) return dateStr || "SANS DLC";
                const [y, m, d] = dateStr.split("-");
                return `${d}-${m}-${y}`;
            };

            const checkDLCStatus = (p) => {
                if (p.congele == 1) return "frozen-style";
                if (!p.date) return "";
                const diff = (new Date(p.date) - new Date()) / (1000 * 3600 * 24);
                if (diff <= 3) return "warning-dlc";
                return "";
            };

            const syncWithServer = async (p) => {
                try { await fetch(`${API_URL}?action=save_product&user=${currentUser}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(p) }); }
                catch (err) { console.error(err); }
            };

            const scanTicket = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setReceiptItems([]);
                try {
                    let source = "";
                    if (file.type === "application/pdf") {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({ scale: 2.5 });
                        const canvas = document.createElement("canvas");
                        const context = canvas.getContext("2d");
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        source = canvas.toDataURL("image/png");
                    } else { source = URL.createObjectURL(file); }

                    const worker = await Tesseract.createWorker("fra");
                    await worker.setParameters({ preserve_interword_spaces: "1" });
                    const { data: { text } } = await worker.recognize(source);
                    const lignes = text.split("\n").map(l => l.trim().toUpperCase());
                    const res = [];

                    // --- DETECTION DU MAGASIN ---
                    const isHyperU = text.toUpperCase().includes("VENTE");
                    let startIdx = -1;
                    let endIdx = lignes.length;

                    if (isHyperU) {
                        // Filtre Hyper U
                        startIdx = lignes.findIndex(l => l.includes("VENTE"));
                        const finalIdx = lignes.findIndex(l => l.includes("NOMBRE DE LIGNES"));
                        if (finalIdx !== -1) endIdx = finalIdx;
                    } else {
                        // Filtre Leclerc
                        startIdx = lignes.findIndex(l => l === "€" || l.endsWith(" €"));
                        const finalIdx = lignes.findIndex(l => l.startsWith("TOTAL"));
                        if (finalIdx !== -1) endIdx = finalIdx;
                    }

                    // --- TRAITEMENT DES LIGNES FILTRÉES ---
                    for (let i = startIdx + 1; i < endIdx; i++) {
                        let l = lignes[i];
                        if (l.length < 3) continue;

                        const regexPrix = /(\d+[\.,]\d{2})\s*(?:€|EUR|E)?$/;
                        const regexMulti = /^(\d+)\s*[X*]\s*[\d,.]+/;

                        if (l.match(regexPrix) || l.match(regexMulti)) {
                            const qte = l.match(regexMulti) ? parseInt(l.match(regexMulti)[1]) : 1;
                            
                            // Remonter pour trouver le nom (jusqu'à 5 lignes pour la pesée U)
                            for (let j = 1; j <= 5; j++) {
                                let nomCandidat = lignes[i - j];
                                if (!nomCandidat) break;

                                // On ignore les lignes techniques
                                if (nomCandidat.length > 3 && 
                                    !nomCandidat.match(regexPrix) && 
                                    !nomCandidat.match(regexMulti) &&
                                    !nomCandidat.includes("PESÉE") && 
                                    !nomCandidat.includes("KG") &&
                                    !nomCandidat.includes("---")) {
                                    
                                    let nomFinal = nomCandidat.replace(/[*_]/g, "").split(",")[0].trim();
                                    if (nomFinal.length > 2 && !nomFinal.includes("MONTANT")) {
                                        const existe = res.findIndex(p => p.nom === nomFinal);
                                        if (existe !== -1) { if(qte > 1) res[existe].qte = qte; }
                                        else res.push({ nom: nomFinal, qte: qte, dlc: "", congele: false, zone: "Alimentaire", rayon: "Fruits et Légumes", typeStock: "unite" });
                                        break;
                                    }
                                }
                            }
                        }
                    }
                    setReceiptItems(res); await worker.terminate();
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            const toggleFreeze = (p) => {
                const updated = { ...p, congele: p.congele == 1 ? 0 : 1 };
                setProduits(produits.map(item => item.id === p.id ? updated : item));
                syncWithServer(updated);
            };

            const updateStock = (id, delta) => {
                const newP = produits.map(p => {
                    if (p.id !== id) return p;
                    let next = p.typeStock === "pourcent" ? Number(p.stock) + delta * 25 : Number(p.stock) + delta;
                    if (next <= 0 && delta < 0) { setConfirmDelete({ show: true, produit: p }); return p; }
                    const u = { ...p, stock: Math.max(0, p.typeStock === "pourcent" ? Math.min(100, next) : next) };
                    syncWithServer(u); return u;
                });
                setProduits(newP);
            };

            const handleMaturity = (nom, etatIndex) => {
                const baseLife = FRUIT_LIFESPAN[nom.toUpperCase()] || 5;
                const coeffs = [1.5, 1.0, 0.5];
                const etats = ["Pas mûr", "Bientôt mûr", "Mûr"];
                const d = new Date();
                d.setDate(d.getDate() + Math.round(baseLife * coeffs[etatIndex]));
                setForm({ ...form, date: d.toISOString().split('T')[0], maturite: etats[etatIndex] });
            };

            if (!isLoggedIn) return (
                <div className="fixed inset-0 bg-green-600 flex items-center justify-center p-6 text-center">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl animate-up">
                        <form onSubmit={(e) => { 
                            e.preventDefault(); 
                            const pass = e.target.p.value; 
                            const users = { "CeciEstMonMotDePasseStock_22": "baptiste", "1912": "soeur", "5678": "pere" }; 
                            if (users[pass]) { localStorage.setItem("stock_user", users[pass]); localStorage.setItem("stock_session", "active"); setIsLoggedIn(true); }
                        }} className="space-y-4">
                            <h2 className="font-black uppercase text-gray-800 italic">Mon Stockage</h2>
                            <input name="p" type="password" inputMode="numeric" placeholder="Code..." className="w-full p-5 bg-gray-50 rounded-2xl border-2 text-center text-xl focus:border-green-500 outline-none" />
                            <button type="submit" className="w-full bg-black text-white p-5 rounded-2xl font-black uppercase">Connexion</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="bg-white p-5 sticky top-0 z-30 border-b shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="font-black italic text-lg uppercase text-green-600 underline leading-none">MON STOCKAGE</h1>
                            <div className="flex gap-2">
                                <button onClick={() => setView("receipt")} className="bg-blue-600 text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase shadow-sm">🧾 Ticket</button>
                                <button onClick={() => setView(view === "home" ? "shopping" : "home")} className="bg-black text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase shadow-sm">{view === "home" ? "Courses" : "Stock"}</button>
                            </div>
                        </div>
                        {view === "home" && <input type="text" placeholder="🔍 Rechercher..." className="w-full px-4 py-3 bg-gray-100 rounded-2xl text-sm outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />}
                    </header>

                    <main className="p-4">
                        {view === "receipt" && (
                            <div className="animate-up space-y-4">
                                <div className="bg-white p-8 rounded-[2.5rem] text-center border-2 border-dashed border-gray-300">
                                    <input type="file" accept="image/*,application/pdf" onChange={scanTicket} id="r-up" className="hidden" />
                                    <label htmlFor="r-up" className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-xs cursor-pointer inline-block shadow-lg active:scale-95">📷 Charger Photo / PDF</label>
                                    {loading && <p className="mt-4 text-[9px] font-black text-blue-500 animate-pulse uppercase">Analyse en cours...</p>}
                                </div>
                                {receiptItems.map((item, idx) => (
                                    <div key={idx} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-3">
                                        <span className="font-black text-xs uppercase text-gray-700 leading-tight block">{item.nom}</span>
                                        <div className="grid grid-cols-2 gap-2">
                                            <select className="p-2 bg-gray-50 rounded-xl text-[9px] font-bold" value={item.zone} onChange={(e) => { const n = [...receiptItems]; n[idx].zone = e.target.value; n[idx].rayon = STRUCTURE[e.target.value].rayons[0].id; setReceiptItems(n); }}>{Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{z}</option>)}</select>
                                            <select className="p-2 bg-gray-50 rounded-xl text-[9px] font-bold" value={item.rayon} onChange={(e) => { const n = [...receiptItems]; n[idx].rayon = e.target.value; setReceiptItems(n); }}>{STRUCTURE[item.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.id}</option>)}</select>
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="date" className="flex-1 p-2 bg-gray-50 rounded-xl text-[9px] font-bold outline-none" value={item.dlc} onChange={(e) => { const n = [...receiptItems]; n[idx].dlc = e.target.value; setReceiptItems(n); }} />
                                            <button onClick={() => { const n = [...receiptItems]; n[idx].congele = !n[idx].congele; setReceiptItems(n); }} className={`p-2 rounded-xl text-lg ${item.congele ? "bg-blue-500 text-white shadow-inner" : "bg-white border text-gray-200"}`}>❄️</button>
                                        </div>
                                    </div>
                                ))}
                                {receiptItems.length > 0 && <button onClick={async () => { setLoading(true); for(const i of receiptItems){ await syncWithServer({id:Date.now()+Math.random(),nom:i.nom,zone:i.zone,rayon:i.rayon,typeStock:'unite',stock:i.qte,date:i.dlc,congele:i.congele?1:0}); } window.location.reload(); }} className="w-full bg-green-600 text-white p-5 rounded-[2.5rem] font-black uppercase text-xs shadow-xl tracking-widest active:scale-95">Tout Ajouter au Stock 🚀</button>}
                            </div>
                        )}

                        {view === "home" && Object.keys(STRUCTURE).map(zone => {
                            const zItems = produits.filter(p => p.zone === zone && Number(p.stock) > 0 && p.nom.toLowerCase().includes(searchTerm.toLowerCase()));
                            if (zItems.length === 0) return null;
                            return (
                                <div key={zone} className="mb-3">
                                    <button onClick={() => setOpenSections(prev => ({ ...prev, [zone]: !prev[zone] }))} className="w-full flex justify-between p-4 bg-white rounded-2xl shadow-sm font-black text-[10px] uppercase text-gray-500 tracking-widest">
                                        <span>{STRUCTURE[zone].icon} {zone}</span>
                                        <span className="opacity-30">{openSections[zone] ? "▲" : "▼"}</span>
                                    </button>
                                    {openSections[zone] && STRUCTURE[zone].rayons.map(ray => {
                                        const rItems = zItems.filter(p => p.rayon === ray.id);
                                        if (rItems.length === 0) return null;
                                        return (
                                            <div key={ray.id} className="ml-4 mt-2 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-2 animate-up">
                                                <button onClick={() => setOpenSections(prev => ({ ...prev, [ray.id]: !prev[ray.id] }))} className="w-full p-3 bg-gray-50/50 flex justify-between text-[9px] font-black uppercase text-gray-400">
                                                    <span>{ray.icon} {ray.id}</span>
                                                    <span>{rItems.length} {openSections[ray.id] ? "▲" : "▼"}</span>
                                                </button>
                                                {openSections[ray.id] && rItems.map(p => (
                                                    <div key={p.id} className={`p-4 flex justify-between items-center border-t border-gray-50 ${checkDLCStatus(p)}`}>
                                                        <div className="flex flex-col">
                                                            <span className="font-bold text-sm text-gray-800 uppercase leading-none mb-1">{p.nom}</span>
                                                            <span className="text-[9px] text-gray-400 italic font-bold uppercase">{p.congele == 1 ? "❄️ CONGELÉ" : formatFR(p.date)}</span>
                                                        </div>
                                                        <div className="flex items-center gap-1">
                                                            <button onClick={() => toggleFreeze(p)} className={`w-8 h-8 rounded-lg border flex items-center justify-center transition-all ${p.congele == 1 ? "bg-blue-500 text-white border-blue-600 shadow-inner" : "bg-white text-gray-200"}`}>❄️</button>
                                                            <button onClick={() => updateStock(p.id, -1)} className="w-8 h-8 bg-white border border-gray-100 rounded-lg font-bold shadow-sm">-</button>
                                                            <button onClick={() => updateStock(p.id, 1)} className="w-8 h-8 bg-white border border-gray-100 rounded-lg font-bold shadow-sm">+</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })}
                                </div>
                            );
                        })}

                        {view === "shopping" && (
                            <div className="bg-white rounded-[2.5rem] shadow-sm divide-y divide-gray-50 overflow-hidden animate-up">
                                {produits.filter(p => Number(p.stock) === 0).length === 0 ? <p className="p-16 text-center text-gray-300 italic text-[10px] uppercase font-black tracking-widest opacity-30">Liste vide</p> :
                                    produits.filter(p => Number(p.stock) === 0).map(p => (
                                        <div key={p.id} className="flex items-center justify-between p-5 px-6 active:bg-gray-50">
                                            <div className="flex items-center gap-4"><input type="checkbox" className="w-6 h-6 accent-green-600 rounded-lg" onChange={() => updateStock(p.id, 1)} /><span className="font-bold text-sm text-gray-700 uppercase">{p.nom}</span></div>
                                            <button onClick={() => { fetch(`${API_URL}?action=delete_product&id=${p.id}&user=${currentUser}`); setProduits(produits.filter(i => i.id !== p.id)); }} className="text-gray-200 text-xl">✕</button>
                                        </div>
                                    ))
                                }
                            </div>
                        )}
                    </main>

                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end z-[60] p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 max-w-sm mx-auto animate-up shadow-2xl">
                                <h2 className="text-center font-black mb-6 uppercase text-gray-300 text-[10px] tracking-widest italic">Nouveau Produit</h2>
                                <input type="text" placeholder="NOM..." className="w-full p-4 bg-gray-50 rounded-2xl mb-4 font-bold text-sm outline-none shadow-inner" value={form.nom} onChange={e => setForm({...form, nom: e.target.value.toUpperCase()})} />
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold" value={form.zone} onChange={e => setForm({...form, zone: e.target.value, rayon: STRUCTURE[e.target.value].rayons[0].id})}>{Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{z}</option>)}</select>
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold" value={form.rayon} onChange={e => setForm({...form, rayon: e.target.value})}>{STRUCTURE[form.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.id}</option>)}</select>
                                </div>
                                <div className="mb-6">
                                    {form.rayon === "Fruits et Légumes" ? (
                                        <div className="space-y-2">
                                            <div className="flex gap-1">{["Pas mûr", "Bientôt", "Mûr"].map((label, idx) => (<button key={label} onClick={() => handleMaturity(form.nom, idx)} className={`flex-1 py-3 rounded-xl text-[8px] font-black uppercase transition-all border-2 ${form.maturite === (idx===0?"Pas mûr":idx===1?"Bientôt mûr":"Mûr") ? 'bg-orange-500 border-orange-600 text-white' : 'bg-gray-50 text-gray-400'}`}>{label}</button>))}</div>
                                            {form.date && <p className="text-center text-[10px] font-black text-orange-600 italic tracking-tighter uppercase">Prévu le : {formatFR(form.date)}</p>}
                                        </div>
                                    ) : (
                                        <input type="date" className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold outline-none" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                    )}
                                </div>
                                <button onClick={async () => { const n={...form,id:Date.now(),stock:Number(form.stock),congele:form.congele?1:0}; setProduits([n,...produits]); await syncWithServer(n); setShowAddModal(false); setForm({nom:'',zone:'Alimentaire',rayon:'Fruits et Légumes',typeStock:'unite',stock:1,date:'',congele:false,maturite:''}); }} className="w-full bg-green-600 text-white p-5 rounded-[2.5rem] font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Enregistrer ✅</button>
                                <button onClick={() => setShowAddModal(false)} className="w-full text-gray-300 text-[10px] font-black uppercase mt-4">Annuler</button>
                            </div>
                        </div>
                    )}

                    {confirmDelete.show && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[110] p-6 text-center">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl animate-up">
                                <h3 className="font-black uppercase text-sm mb-2 text-gray-800 tracking-tighter">Stock épuisé !</h3>
                                <p className="text-gray-400 text-[9px] mb-8 uppercase font-bold">Ajouter {confirmDelete.produit?.nom} à la liste ?</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => { const p=confirmDelete.produit; const u={...p,stock:0}; setProduits(produits.map(i=>i.id===p.id?u:i)); syncWithServer(u); setConfirmDelete({show:false,produit:null}); }} className="w-full bg-green-600 text-white p-4 rounded-2xl font-black uppercase text-[10px] active:scale-95 transition-all shadow-md">En courses 🛒</button>
                                    <button onClick={() => { const p=confirmDelete.produit; fetch(`${API_URL}?action=delete_product&id=${p.id}&user=${currentUser}`); setProduits(produits.filter(i=>i.id!==p.id)); setConfirmDelete({show:false,produit:null}); }} className="w-full bg-gray-100 text-gray-400 p-4 rounded-2xl font-black uppercase text-[10px] active:scale-95 transition-all">Supprimer</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 backdrop-blur-md p-2 rounded-[2.5rem] flex justify-around items-center shadow-2xl z-40 border border-gray-100">
                        <button onClick={() => setView("home")} className={`p-4 transition-all duration-300 ${view === "home" ? "text-green-600 scale-125" : "text-gray-200"}`}>🏠</button>
                        <button onClick={() => { setForm({nom:'',zone:'Alimentaire',rayon:'Fruits et Légumes',typeStock:'unite',stock:1,date:'',congele:false,maturite:''}); setShowAddModal(true); }} className="bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-xl active:scale-75 transition-all font-light">＋</button>
                        <button onClick={() => setView("shopping")} className={`p-4 transition-all duration-300 ${view === "shopping" ? "text-green-600 scale-125" : "text-gray-200"}`}>🛒</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
