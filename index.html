<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#22c55e">
    <title>Mon Stockage Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { touch-action: manipulation; font-family: sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-orange { 0%, 100% { background-color: #fff; } 50% { background-color: #fff7ed; } }
        .warning-dlc { animation: pulse-orange 2s infinite; border-left: 5px solid #fb923c !important; }
        .expired-dlc { background-color: #fef2f2; border-left: 5px solid #ef4444 !important; }
        .animate-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #barcode-ui video { width: 100%; height: 100%; object-fit: cover; border-radius: 2rem; }
        #barcode-ui canvas { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = "https://baptisterouxel.fr/stock/api.php";
        const { useState, useEffect, useRef } = React;
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

        // --- DURÉE DE VIE FRUITS & LÉGUMES (jours) ---
        const FRUIT_LIFESPAN = {
            "FRAISE": 2, "FRAMBOISE": 2, "MURE": 2, "MYRTILLE": 3, "CERISE": 3, "SALADE": 3, "CHAMPIGNON": 3, "EPINARD": 2, "ASPERGE": 3,
            "POIRE": 7, "TOMATE": 7, "BANANE": 5, "AVOCAT": 4, "PECHE": 5, "NECTARINE": 5, "ABRICOT": 4, "PRUNE": 6, "COURGETTE": 6, "AUBERGINE": 6, "POIVRON": 7, "CONCOMBRE": 6, "HARICOT VERT": 5, "BROCOLI": 5,
            "POMME": 21, "ORANGE": 14, "CITRON": 20, "PAMPLEMOUSSE": 15, "MELON": 10, "PASTEQUE": 10, "POMME DE TERRE": 30, "OIGNON": 30, "AIL": 60, "CAROTTE": 20, "CHOU-FLEUR": 12, "CHOU": 15, "RADIS": 10, "KIWI": 15
        };

        const STRUCTURE = {
            "Alimentaire": { icon: "🧺", rayons: [
                { id: "Fruits et Légumes", icon: "🍎" }, { id: "Viande", icon: "🥩" }, { id: "Poisson", icon: "🐟" },
                { id: "Produits Laitiers", icon: "🥛" }, { id: "Salé", icon: "🧂" }, { id: "Sucré", icon: "🍪" }, 
                { id: "Condiments", icon: "🍯" }, { id: "Boissons", icon: "🍷" }, { id: "Surgelés", icon: "❄️" }, { id: "Boulangerie", icon: "🥖" }
            ]},
            "Hygiène": { icon: "✨", rayons: [
                { id: "Hygiène Corporelle", icon: "🧼" }, { id: "Hygiène Dentaire", icon: "🪥" }, 
                { id: "Produits Ménagers", icon: "🧹" }, { id: "Papier", icon: "🧻" }, { id: "Lessive", icon: "🧺" }
            ]},
            "Divers": { icon: "📦", rayons: [
                { id: "Pharmacie", icon: "🩹" }, { id: "Animaux", icon: "🐾" }, { id: "Bricolage", icon: "🛠️" }, { id: "Autres", icon: "🌀" }
            ]}
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('stock_session') === 'active');
            const [produits, setProduits] = useState([]);
            const [view, setView] = useState('home'); 
            const [loading, setLoading] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState({ show: false, produit: null });
            const [searchTerm, setSearchTerm] = useState('');
            const [openSections, setOpenSections] = useState({});
            const [form, setForm] = useState({ nom: '', zone: 'Alimentaire', rayon: 'Fruits et Légumes', typeStock: 'unite', stock: 1, date: '', congele: false, maturite: '' });
            const [receiptItems, setReceiptItems] = useState([]);
            const [isScanningBarcode, setIsScanningBarcode] = useState(false);
            const isProcessingBarcode = useRef(false);
            const currentUser = localStorage.getItem('stock_user') || 'baptiste';

            useEffect(() => { if (isLoggedIn) refreshStock(); }, [isLoggedIn, currentUser]);

            const refreshStock = () => {
                fetch(`${API_URL}?action=get_stock&user=${currentUser}`)
                    .then(res => res.json())
                    .then(data => setProduits(Array.isArray(data) ? data : []))
                    .catch(() => setProduits([]));
            };

            const formatFR = (dateStr) => {
                if (!dateStr || !dateStr.includes('-')) return dateStr || 'SANS DATE';
                const [y, m, d] = dateStr.split('-');
                return `${d}/${m}/${y}`;
            };

            const checkDLCStatus = (dateStr) => {
                if (!dateStr) return "";
                const today = new Date();
                const dlc = new Date(dateStr);
                const diff = (dlc - today) / (1000 * 3600 * 24);
                if (diff < 0) return "expired-dlc";
                if (diff <= 3) return "warning-dlc";
                return "";
            };

            const syncWithServer = async (p) => {
                try { await fetch(`${API_URL}?action=save_product&user=${currentUser}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) }); }
                catch (err) { console.error(err); }
            };

            // --- SCANNER CODE-BARRES ---
            const startBarcode = () => {
                setIsScanningBarcode(true);
                isProcessingBarcode.current = false;
                setTimeout(() => {
                    Quagga.init({
                        inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#barcode-ui'), constraints: { facingMode: "environment" } },
                        decoder: { readers: ["ean_reader", "ean_8_reader"] },
                        locate: true
                    }, (err) => {
                        if (err) { setIsScanningBarcode(false); return; }
                        Quagga.start();
                    });
                    Quagga.onDetected(async (data) => {
                        if (isProcessingBarcode.current) return;
                        isProcessingBarcode.current = true;
                        const code = data.codeResult.code;
                        const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
                        const json = await res.json();
                        if (json.status === 1) {
                            const p = json.product;
                            const nom = (p.product_name_fr || p.product_name || "INCONNU").toUpperCase();
                            setForm({ ...form, nom: nom, stock: 1, maturite: '' });
                            setShowAddModal(true);
                            Quagga.stop();
                            setIsScanningBarcode(false);
                        } else { isProcessingBarcode.current = false; }
                    });
                }, 300);
            };

            // --- SCANNER TICKET (REINTEGRÉ) ---
            const scanTicket = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setReceiptItems([]);
                try {
                    let source = "";
                    if (file.type === "application/pdf") {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({ scale: 2.0 });
                        const canvas = document.createElement("canvas");
                        const context = canvas.getContext("2d");
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        source = canvas.toDataURL("image/png");
                    } else { source = URL.createObjectURL(file); }

                    const worker = await Tesseract.createWorker("fra");
                    const { data: { text } } = await worker.recognize(source);
                    const lignes = text.split("\n");
                    const res = [];
                    lignes.forEach((ligne) => {
                        let l = ligne.trim().toUpperCase();
                        const regexPrix = /(\d+[\.,]\d{2})\s*(?:€|EUR|E)?$/;
                        if (regexPrix.test(l) && !l.includes("TOTAL")) {
                            let nF = l.replace(regexPrix, "").replace(/[*_]/g, "").trim();
                            if (nF.length > 2) {
                                res.push({ nom: nF, qte: 1, dlc: '', zone: 'Alimentaire', rayon: 'Fruits et Légumes', typeStock: 'unite' });
                            }
                        }
                    });
                    setReceiptItems(res);
                    await worker.terminate();
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            // --- MATURITÉ ---
            const handleMaturity = (nom, etatIndex) => {
                const baseLife = FRUIT_LIFESPAN[nom.toUpperCase()] || 5;
                const coeffs = [1.5, 1.0, 0.5];
                const etats = ["Pas mûr", "Bientôt mûr", "Mûr"];
                const d = new Date();
                d.setDate(d.getDate() + Math.round(baseLife * coeffs[etatIndex]));
                setForm({ ...form, date: d.toISOString().split('T')[0], maturite: etats[etatIndex] });
            };

            if (!isLoggedIn) return (
                <div className="fixed inset-0 bg-green-600 flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl">
                        <form onSubmit={(e) => { 
                            e.preventDefault(); 
                            const pass = e.target.p.value; 
                            const users = {"CeciEstMonMotDePasseStock_22":'baptiste',"1912":'soeur',"5678":'pere'}; 
                            if(users[pass]){ localStorage.setItem('stock_user',users[pass]); localStorage.setItem('stock_session','active'); setIsLoggedIn(true); }
                        }} className="space-y-4">
                            <h2 className="font-black uppercase text-center text-gray-800">Accès</h2>
                            <input name="p" type="password" inputMode="numeric" placeholder="Code..." className="w-full p-5 bg-gray-50 rounded-2xl border-2 text-center text-xl focus:border-green-500" />
                            <button type="submit" className="w-full bg-black text-white p-5 rounded-2xl font-black uppercase active:scale-95 transition-all">Connexion</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="bg-white p-5 sticky top-0 z-30 border-b shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="font-black italic text-lg uppercase text-green-600 underline">MON STOCKAGE</h1>
                            <div className="flex gap-2">
                                <button onClick={() => setView('receipt')} className="bg-blue-600 text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase shadow-sm active:scale-95">🧾 Ticket</button>
                                <button onClick={() => setView(view === 'home' ? 'shopping' : 'home')} className="bg-black text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase shadow-sm active:scale-95">{view === 'home' ? 'Courses' : 'Stock'}</button>
                            </div>
                        </div>
                        {view === 'home' && <input type="text" placeholder="🔍 Rechercher..." className="w-full px-4 py-3 bg-gray-100 rounded-2xl text-sm outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />}
                    </header>

                    <main className="p-4">
                        {/* SCANNER CODE-BARRE */}
                        {view === 'home' && !searchTerm && (
                            <div className="mb-6">
                                {!isScanningBarcode ? (
                                    <button onClick={startBarcode} className="w-full p-4 bg-white border-2 border-green-500 text-green-600 rounded-2xl font-black uppercase text-[10px] shadow-sm flex items-center justify-center gap-3 active:scale-95">📷 Scanner Code-Barre</button>
                                ) : (
                                    <div className="relative animate-up h-64 bg-black rounded-[2rem] overflow-hidden border-4 border-green-500" id="barcode-ui">
                                        <button onClick={() => { Quagga.stop(); setIsScanningBarcode(false); }} className="absolute top-4 right-4 bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-black z-20">ANNULER</button>
                                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none"><div className="w-[80%] h-[2px] bg-green-500 animate-pulse shadow-[0_0_15px_green]"></div></div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VUE TICKET */}
                        {view === 'receipt' && (
                            <div className="animate-up space-y-4">
                                <div className="bg-white p-8 rounded-[2.5rem] text-center border-2 border-dashed border-gray-300">
                                    <input type="file" accept="image/*,application/pdf" onChange={scanTicket} id="r-up" className="hidden" />
                                    <label htmlFor="r-up" className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-xs cursor-pointer inline-block shadow-lg">📷 PHOTO OU PDF</label>
                                    {loading && <p className="mt-4 text-[9px] font-black text-blue-500 animate-pulse uppercase">Analyse en cours...</p>}
                                </div>
                                {receiptItems.map((item, idx) => (
                                    <div key={idx} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-3">
                                        <div className="flex justify-between items-center"><span className="font-black text-xs uppercase text-gray-700 w-2/3 leading-tight">{item.nom}</span></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <select className="p-2 bg-gray-50 rounded-xl text-[9px] font-bold outline-none" value={item.zone} onChange={(e) => { const n = [...receiptItems]; n[idx].zone = e.target.value; n[idx].rayon = STRUCTURE[e.target.value].rayons[0].id; setReceiptItems(n); }}>
                                                {Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{z}</option>)}
                                            </select>
                                            <select className="p-2 bg-gray-50 rounded-xl text-[9px] font-bold outline-none" value={item.rayon} onChange={(e) => { const n = [...receiptItems]; n[idx].rayon = e.target.value; setReceiptItems(n); }}>
                                                {STRUCTURE[item.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.id}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                ))}
                                {receiptItems.length > 0 && <button onClick={async () => { setLoading(true); for(const i of receiptItems){ await syncWithServer({id:Date.now()+Math.random(),nom:i.nom,zone:i.zone,rayon:i.rayon,typeStock:i.typeStock,stock:i.qte,date:i.dlc,congele:0}); } window.location.reload(); }} className="w-full bg-green-600 text-white p-5 rounded-[2.5rem] font-black uppercase text-xs shadow-xl tracking-widest">Enregistrer au stock 🚀</button>}
                            </div>
                        )}

                        {/* STOCK */}
                        {view === 'home' && Object.keys(STRUCTURE).map(zone => {
                            const zItems = produits.filter(p => p.zone === zone && Number(p.stock) > 0 && p.nom.toLowerCase().includes(searchTerm.toLowerCase()));
                            if (zItems.length === 0) return null;
                            return (
                                <div key={zone} className="mb-3">
                                    <button onClick={() => setOpenSections(prev => ({...prev, [zone]: !prev[zone]}))} className="w-full flex justify-between p-4 bg-white rounded-2xl shadow-sm font-black text-[10px] uppercase text-gray-500 tracking-widest">
                                        <span>{STRUCTURE[zone].icon} {zone}</span>
                                        <span>{openSections[zone] ? '▲' : '▼'}</span>
                                    </button>
                                    {openSections[zone] && STRUCTURE[zone].rayons.map(ray => {
                                        const rItems = zItems.filter(p => p.rayon === ray.id);
                                        if (rItems.length === 0) return null;
                                        return (
                                            <div key={ray.id} className="ml-2 mt-2 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-2 animate-up">
                                                <div className="p-3 bg-gray-50/50 text-[9px] font-black uppercase text-gray-400 border-b flex justify-between"><span>{ray.icon} {ray.id}</span><span>{rItems.length}</span></div>
                                                {rItems.map(p => (
                                                    <div key={p.id} className={`p-4 flex justify-between items-center border-t border-gray-50 ${checkDLCStatus(p.date)}`}>
                                                        <div className="flex flex-col"><span className="font-bold text-sm text-gray-800 uppercase leading-none mb-1">{p.nom}</span><span className="text-[9px] text-gray-400 italic font-bold uppercase">{formatFR(p.date)}</span></div>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-[10px] font-black bg-gray-100 px-2 py-1 rounded-lg">{p.typeStock==='pourcent'?p.stock+'%':'x'+p.stock}</span>
                                                            <button onClick={() => updateStock(p.id, -1)} className="w-9 h-9 bg-white border border-gray-100 rounded-xl font-bold shadow-sm">-</button>
                                                            <button onClick={() => updateStock(p.id, 1)} className="w-9 h-9 bg-white border border-gray-100 rounded-xl font-bold shadow-sm">+</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })}
                                </div>
                            );
                        })}

                        {/* COURSES */}
                        {view === 'shopping' && (
                            <div className="bg-white rounded-[2.5rem] shadow-sm divide-y divide-gray-50 overflow-hidden animate-up">
                                {produits.filter(p => Number(p.stock) === 0).length === 0 ? <p className="p-16 text-center text-gray-300 italic text-[10px] uppercase font-black">Liste vide</p> :
                                    produits.filter(p => Number(p.stock) === 0).map(p => (
                                        <div key={p.id} className="flex items-center justify-between p-5 px-6">
                                            <div className="flex items-center gap-4"><input type="checkbox" className="w-6 h-6 accent-green-600" onChange={() => updateStock(p.id, 1)} /><div><p className="font-bold text-sm text-gray-700 uppercase">{p.nom}</p></div></div>
                                            <button onClick={() => { fetch(`${API_URL}?action=delete_product&id=${p.id}&user=${currentUser}`); setProduits(produits.filter(i => i.id !== p.id)); }} className="text-gray-200">✕</button>
                                        </div>
                                    ))
                                }
                            </div>
                        )}
                    </main>

                    {/* MODALE AJOUT */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end z-[60] p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 max-w-sm mx-auto animate-up shadow-2xl">
                                <h2 className="text-center font-black mb-6 uppercase text-gray-400 text-[10px] tracking-widest">Nouvel Article</h2>
                                <input type="text" placeholder="NOM..." className="w-full p-4 bg-gray-50 rounded-2xl mb-4 font-bold text-sm outline-none" value={form.nom} onChange={e => setForm({...form, nom: e.target.value.toUpperCase()})} />
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold" value={form.zone} onChange={e => setForm({...form, zone: e.target.value, rayon: STRUCTURE[e.target.value].rayons[0].id})}>
                                        {Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{z}</option>)}
                                    </select>
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[9px] font-bold" value={form.rayon} onChange={e => setForm({...form, rayon: e.target.value})}>
                                        {STRUCTURE[form.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.id}</option>)}
                                    </select>
                                </div>
                                <div className="mb-6">
                                    {form.rayon === "Fruits et Légumes" ? (
                                        <div className="space-y-2">
                                            <div className="flex gap-1">
                                                {["Pas mûr", "Bientôt", "Mûr"].map((label, idx) => (
                                                    <button key={label} onClick={() => handleMaturity(form.nom, idx)} className={`flex-1 py-3 rounded-xl text-[8px] font-black uppercase transition-all border-2 ${form.maturite === (idx===0?"Pas mûr":idx===1?"Bientôt mûr":"Mûr") ? 'bg-orange-500 border-orange-600 text-white' : 'bg-gray-50 text-gray-400'}`}>{label}</button>
                                                ))}
                                            </div>
                                            {form.date && <p className="text-center text-[10px] font-black text-orange-600 italic">Estimé au : {formatFR(form.date)}</p>}
                                        </div>
                                    ) : (
                                        <input type="date" className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                    )}
                                </div>
                                <button onClick={async () => { const n={...form,id:Date.now(),stock:Number(form.stock)}; setProduits([n,...produits]); await syncWithServer(n); setShowAddModal(false); }} className="w-full bg-green-600 text-white p-5 rounded-[2.5rem] font-black uppercase text-xs shadow-xl">Enregistrer ✅</button>
                                <button onClick={() => setShowAddModal(false)} className="w-full text-gray-300 text-[10px] font-black uppercase mt-4">Annuler</button>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 backdrop-blur-md p-2 rounded-[2.5rem] flex justify-around items-center shadow-2xl z-40 border border-gray-100">
                        <button onClick={() => setView('home')} className={`p-4 ${view==='home'?'text-green-600 scale-125':'text-gray-200'}`}>🏠</button>
                        <button onClick={() => setShowAddModal(true)} className="bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-xl active:scale-75">＋</button>
                        <button onClick={() => setView('shopping')} className={`p-4 ${view==='shopping'?'text-green-600 scale-125':'text-gray-200'}`}>🛒</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
