<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="data:application/manifest+json,{'display':'standalone','name':'Mon Stock Pro','short_name':'Stock','start_url':'/','background_color':'#ffffff','theme_color':'#22c55e'}" />
    <title>Mon Stock Expert v15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { touch-action: manipulation; font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-orange { 0%, 100% { background-color: #fff; } 50% { background-color: #fff7ed; } }
        .warning-dlc { animation: pulse-orange 2s infinite; border: 2px solid #fb923c !important; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const STRUCTURE = {
            "Alimentaire": { icon: "🍎", rayons: [
                { id: "Fruit et légume", icon: "🧺" }, { id: "Viande", icon: "🥩" }, { id: "Poisson", icon: "🐟" },
                { id: "Cremerie", icon: "🥛" }, { id: "Fromagerie", icon: "🧀" }, { id: "Surgelées", icon: "❄️" },
                { id: "Salée", icon: "🧂" }, { id: "Sucré", icon: "🍪" }, { id: "Boulangerie", icon: "🥖" },
                { id: "Boissons", icon: "🍷" }
            ]},
            "Hygiène": { icon: "✨", rayons: [
                { id: "Corporelle", icon: "🧼" }, { id: "Soin", icon: "💄" }, { id: "Hygiene papier", icon: "🧻" },
                { id: "Parapharmacie", icon: "🩹" }, { id: "Produit d'entretien", icon: "🧹" }
            ]}
        };

        const App = () => {
            const [produits, setProduits] = useState(() => {
                const saved = localStorage.getItem('mon_stock_v15') || localStorage.getItem('mon_stock_v14') || localStorage.getItem('mon_stock_v13') || localStorage.getItem('mon_stock_v12');
                return saved ? JSON.parse(saved) : [];
            });

            const [view, setView] = useState('home');
            const [showAddModal, setShowAddModal] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [openSections, setOpenSections] = useState({});
            const [form, setForm] = useState({ nom: '', zone: 'Alimentaire', rayon: 'Fruit et légume', typeStock: 'pourcent', stock: 1, date: '', directShopping: false, congele: false });

            useEffect(() => {
                localStorage.setItem('mon_stock_v15', JSON.stringify(produits));
            }, [produits]);

            const reparerStock = () => {
                const versions = ['mon_stock_v14','mon_stock_v13','mon_stock_v12','mon_stock_v11','mon_stock_v10','mon_stock_v9'];
                let recup = [];
                versions.forEach(v => {
                    const d = localStorage.getItem(v);
                    if(d) recup = [...recup, ...JSON.parse(d)];
                });
                const clean = Array.from(new Map([...recup, ...produits].map(i => [i.nom, i])).values());
                setProduits(clean);
                alert("Stock synchronisé !");
            };

            const updateStock = (id, delta) => {
                setProduits(produits.map(p => {
                    if (p.id !== id) return p;
                    let next = p.typeStock === 'pourcent' ? p.stock + (delta * 25) : p.stock + delta;
                    if (next <= 0) return confirm(`Plus de ${p.nom} ?`) ? { ...p, stock: 0, checked: false } : null;
                    return { ...p, stock: Math.max(0, p.typeStock === 'pourcent' ? Math.min(100, next) : next) };
                }).filter(Boolean));
            };

            const checkDLC = (dateStr, congele) => {
                if (!dateStr || congele) return { status: 'ok', msg: '' };
                const diff = (new Date(dateStr) - new Date()) / (1000 * 60 * 60 * 24);
                if (diff < 0) return { status: 'expired', msg: 'PÉRIMÉ' };
                if (diff <= 3) return { status: 'warning', msg: 'DLC PROCHE' };
                return { status: 'ok', msg: '' };
            };

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-32">
                    <header className="bg-white p-5 sticky top-0 z-30 border-b shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="font-black italic text-lg uppercase">📦 Stock v15</h1>
                            <div className="flex gap-2">
                                <button onClick={reparerStock} className="bg-orange-100 p-2 rounded-lg">🔄</button>
                                <button onClick={() => setView(view === 'home' ? 'shopping' : 'home')} className="bg-black text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase">
                                    {view === 'home' ? 'Courses' : 'Stock'}
                                </button>
                            </div>
                        </div>
                        {view === 'home' && (
                            <input type="text" placeholder="Rechercher..." className="w-full px-4 py-3 bg-gray-100 rounded-2xl text-sm outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        )}
                    </header>

                    <main className="p-4">
                        {view === 'home' ? (
                            Object.keys(STRUCTURE).map(zone => {
                                const zoneItems = produits.filter(p => p.zone === zone && p.stock > 0 && p.nom.toLowerCase().includes(searchTerm.toLowerCase()));
                                if (zoneItems.length === 0) return null;
                                return (
                                    <div key={zone} className="mb-4">
                                        <button onClick={() => setOpenSections(prev => ({...prev, [zone]: !prev[zone]}))} className="w-full flex justify-between p-4 bg-white rounded-2xl shadow-sm border mb-2 font-bold text-sm uppercase italic">
                                            <span>{STRUCTURE[zone].icon} {zone}</span>
                                            <span className="opacity-30">{openSections[zone] ? '▲' : '▼'}</span>
                                        </button>
                                        {openSections[zone] && STRUCTURE[zone].rayons.map(ray => {
                                            const rayItems = zoneItems.filter(p => p.rayon === ray.id);
                                            if (rayItems.length === 0) return null;
                                            return (
                                                <div key={ray.id} className="ml-4 mb-2 bg-white rounded-xl border overflow-hidden shadow-sm">
                                                    <button onClick={() => setOpenSections(prev => ({...prev, [ray.id]: !prev[ray.id]}))} className="w-full p-2 text-[10px] font-black uppercase text-gray-400 px-4 bg-gray-50 flex justify-between border-b">
                                                        <span>{ray.icon} {ray.id}</span>
                                                        <span>{rayItems.length} {openSections[ray.id] ? '▲' : '▼'}</span>
                                                    </button>
                                                    {openSections[ray.id] && (
                                                        <div className="p-2 space-y-2">
                                                            {rayItems.map(p => {
                                                                const dlc = checkDLC(p.date, p.congele);
                                                                return (
                                                                    <div key={p.id} className={`p-4 rounded-xl border ${dlc.status === 'warning' ? 'warning-dlc' : dlc.status === 'expired' ? 'bg-red-50 border-red-200' : 'bg-white'}`}>
                                                                        <div className="flex justify-between items-center mb-2">
                                                                            <div className="flex flex-col">
                                                                                <span className="font-bold text-sm">{p.nom}</span>
                                                                                {dlc.msg && <span className="text-[8px] font-black text-red-600 tracking-tighter">{dlc.msg}</span>}
                                                                            </div>
                                                                            <span className="text-[10px] font-black px-2 py-1 bg-gray-100 rounded-lg">{p.typeStock === 'pourcent' ? p.stock+'%' : 'Qté: '+p.stock}</span>
                                                                        </div>
                                                                        <div className="flex justify-between items-center">
                                                                            <div className="flex items-center gap-2">
                                                                                <span className="text-[9px] text-gray-400 font-bold">{p.date || 'Pas de date'}</span>
                                                                                <button onClick={() => setProduits(produits.map(i => i.id === p.id ? {...i, congele: !i.congele} : i))} className={`text-[10px] p-1 rounded font-black ${p.congele ? 'bg-blue-500 text-white' : 'bg-gray-200'}`}>❄️</button>
                                                                            </div>
                                                                            <div className="flex gap-2">
                                                                                <button onClick={() => updateStock(p.id, -1)} className="w-10 h-10 bg-white border rounded-xl font-bold active:bg-gray-100 shadow-sm">-</button>
                                                                                <button onClick={() => updateStock(p.id, 1)} className="w-10 h-10 bg-white border rounded-xl font-bold active:bg-gray-100 shadow-sm">+</button>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                );
                            })
                        ) : (
                            <div className="bg-white rounded-2xl border shadow-sm divide-y">
                                {produits.filter(p => p.stock === 0 || p.checked).map(p => (
                                    <div key={p.id} className="flex items-center justify-between p-4">
                                        <div className="flex items-center gap-3">
                                            <input type="checkbox" checked={p.checked} onChange={() => setProduits(produits.map(i => i.id === p.id ? {...i, checked: !i.checked} : i))} className="w-6 h-6 accent-black shadow-sm" />
                                            <div>
                                                <p className={`font-bold text-sm ${p.checked ? 'line-through opacity-20' : ''}`}>{p.nom}</p>
                                                <p className="text-[9px] text-gray-400 font-black uppercase tracking-tighter">{p.rayon}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setProduits(produits.filter(i => i.id !== p.id))} className="text-gray-300 p-2">✕</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-end z-50 p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 max-w-sm mx-auto shadow-2xl overflow-y-auto max-h-[85vh] animate-up">
                                <h2 className="text-center font-black mb-6 uppercase text-gray-300 text-[10px] tracking-widest italic">Nouveau Produit</h2>
                                <input type="text" placeholder="Nom..." className="w-full p-4 bg-gray-50 rounded-2xl mb-4 border outline-none font-bold text-lg" value={form.nom} onChange={e => setForm({...form, nom: e.target.value})} />
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    <select className="p-3 bg-white border rounded-xl text-[10px] font-bold" value={form.zone} onChange={e => setForm({...form, zone: e.target.value, rayon: STRUCTURE[e.target.value].rayons[0].id})}>
                                        {Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{z}</option>)}
                                    </select>
                                    <select className="p-3 bg-white border rounded-xl text-[10px] font-bold" value={form.rayon} onChange={e => setForm({...form, rayon: e.target.value})}>
                                        {STRUCTURE[form.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.id}</option>)}
                                    </select>
                                </div>
                                <div className="flex gap-2 mb-4 bg-gray-100 p-1 rounded-xl">
                                    <button onClick={() => setForm({...form, typeStock: 'pourcent'})} className={`flex-1 py-2 rounded-lg text-[10px] font-black uppercase ${form.typeStock === 'pourcent' ? 'bg-white shadow-sm' : 'text-gray-400'}`}>% Contenant</button>
                                    <button onClick={() => setForm({...form, typeStock: 'unite'})} className={`flex-1 py-2 rounded-lg text-[10px] font-black uppercase ${form.typeStock === 'unite' ? 'bg-white shadow-sm' : 'text-gray-400'}`}>123 Unité</button>
                                </div>
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    <input type="date" className="p-3 bg-white border rounded-xl text-[10px] font-bold uppercase" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                    {form.typeStock === 'unite' && <input type="number" placeholder="Qté" className="p-3 bg-white border rounded-xl text-[10px] font-bold" value={form.stock} onChange={e => setForm({...form, stock: Number(e.target.value)})} />}
                                </div>
                                <label className="flex items-center gap-3 mb-4 p-4 bg-blue-50 rounded-2xl border-2 border-dashed border-blue-100">
                                    <input type="checkbox" checked={form.congele} onChange={e => setForm({...form, congele: e.target.checked})} className="w-5 h-5 accent-blue-600 shadow-sm" />
                                    <span className="text-[10px] font-black text-blue-800 uppercase italic">Congélateur ❄️</span>
                                </label>
                                <label className="flex items-center gap-3 mb-6 p-4 bg-red-50 rounded-2xl border-2 border-dashed border-red-100 active:scale-95 transition-all">
                                    <input type="checkbox" checked={form.directShopping} onChange={e => setForm({...form, directShopping: e.target.checked})} className="w-6 h-6 accent-red-500 rounded-lg shadow-sm" />
                                    <span className="text-[10px] font-black text-red-700 uppercase italic leading-none">Ajouter en liste de courses</span>
                                </label>
                                <button onClick={() => {
                                    const icon = STRUCTURE[form.zone].rayons.find(r => r.id === form.rayon).icon;
                                    setProduits([{ ...form, id: Date.now(), icon, stock: form.directShopping ? 0 : (form.typeStock === 'pourcent' ? 100 : Number(form.stock)), checked: false }, ...produits]);
                                    setShowAddModal(false);
                                    setForm({ nom: '', zone: 'Alimentaire', rayon: 'Fruit et légume', typeStock: 'pourcent', stock: 1, date: '', directShopping: false, congele: false });
                                }} className="w-full bg-black text-white p-5 rounded-[2rem] font-black shadow-xl uppercase tracking-widest active:scale-95 transition-all">Enregistrer</button>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white border p-2 rounded-[2.5rem] flex justify-around items-center shadow-2xl z-40">
                        <button onClick={() => setView('home')} className={`p-4 ${view === 'home' ? 'text-black scale-125' : 'text-gray-200'}`}>🏠</button>
                        <button onClick={() => setShowAddModal(true)} className="bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-xl active:scale-90 transition-all font-light">+</button>
                        <button onClick={() => setView('shopping')} className={`p-4 ${view === 'shopping' ? 'text-black scale-125' : 'text-gray-200'}`}>🛒</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
