<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#22c55e">
    <title>Mon Stockage Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <style>
        body { touch-action: manipulation; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-orange { 0%, 100% { background-color: #fff; } 50% { background-color: #fff7ed; } }
        .warning-dlc { animation: pulse-orange 2s infinite; border: 2px solid #fb923c !important; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = "https://baptisterouxel.fr/stock/api.php";
        const { useState, useEffect, useMemo, useRef } = React;
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

        const PASS_BAPTISTE = "CeciEstMonMotDePasseStock_22";
        const PASS_SOEUR = "1912";
        const PASS_PERE = "5678";

        const STRUCTURE = {
            "Alimentaire": { icon: "🧺", rayons: [
                { id: "Fruits et Légumes", icon: "🍎" }, { id: "Viande", icon: "🥩" }, 
                { id: "Poisson", icon: "🐟" }, { id: "Produits Laitiers", icon: "🥛" }, 
                { id: "Salé", icon: "🧂" }, { id: "Sucré", icon: "🍪" }, 
                { id: "Condiments", icon: "🍯" }, { id: "Boissons", icon: "🍷" }, 
                { id: "Surgelés", icon: "❄️" }, { id: "Boulangerie", icon: "🥖" }
            ]},
            "Hygiène": { icon: "✨", rayons: [
                { id: "Hygiène Corporelle", icon: "🧼" }, { id: "Hygiène Dentaire", icon: "🪥" }, 
                { id: "Produits Ménagers", icon: "🧹" }, { id: "Papier", icon: "🧻" }, { id: "Lessive", icon: "🧺" }
            ]},
            "Divers": { icon: "📦", rayons: [
                { id: "Pharmacie", icon: "🩹" }, { id: "Animaux", icon: "🐾" },
                { id: "Bricolage", icon: "🛠️" }, { id: "Autres", icon: "🌀" }
            ]}
        };

        // --- COMPOSANT LOGIN ---
        const Login = ({ onLogin }) => {
            const [pass, setPass] = useState('');
            const [error, setError] = useState(false);
            const handleSubmit = (e) => {
                e.preventDefault();
                if ([PASS_BAPTISTE, PASS_SOEUR, PASS_PERE].includes(pass)) {
                    localStorage.setItem('stock_user', pass === PASS_BAPTISTE ? 'baptiste' : (pass === PASS_SOEUR ? 'soeur' : 'pere'));
                    onLogin();
                } else {
                    setError(true); setPass('');
                }
            };
            return (
                <div className="fixed inset-0 bg-green-600 flex items-center justify-center z-[100] p-6 text-center">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl animate-up">
                        <div className="text-5xl mb-6">🔐</div>
                        <h2 className="font-black uppercase text-gray-800 mb-8 italic">Mon Stockage</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="password" inputMode="numeric" placeholder="Code..." className={`w-full p-5 bg-gray-50 rounded-2xl border-2 text-center text-xl ${error ? 'border-red-300' : 'border-transparent focus:border-green-500'}`} value={pass} onChange={(e) => { setPass(e.target.value); setError(false); }} />
                            <button type="submit" className="w-full bg-black text-white p-5 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all">Connexion</button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('stock_session') === 'active');
            const [produits, setProduits] = useState([]);
            const [view, setView] = useState('home'); // home, shopping, receipt
            const [loading, setLoading] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [openSections, setOpenSections] = useState({});
            const [form, setForm] = useState({ nom: '', zone: 'Alimentaire', rayon: 'Fruits et Légumes', typeStock: 'pourcent', stock: 1, date: '', directShopping: false, congele: false });
            
            // États pour le scanner de ticket
            const [receiptItems, setReceiptItems] = useState([]);
            const [magasinInfo, setMagasinInfo] = useState({ nom: "Scanner Pro", color: "blue" });

            const currentUser = localStorage.getItem('stock_user') || 'baptiste';

            useEffect(() => {
                if (isLoggedIn) {
                    fetch(`${API_URL}?action=get_stock&user=${currentUser}`)
                        .then(res => res.json())
                        .then(data => data && Array.isArray(data) ? setProduits(data) : setProduits([]))
                        .catch(() => setProduits([]));
                }
            }, [isLoggedIn, currentUser]);

            const syncWithServer = async (produit) => {
                try {
                    await fetch(`${API_URL}?action=save_product&user=${currentUser}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(produit)
                    });
                } catch (err) { console.error("Erreur synchro:", err); }
            };

            const handleLoginSuccess = () => {
                localStorage.setItem('stock_session', 'active');
                setIsLoggedIn(true);
            };

            // --- LOGIQUE SCANNER TICKET (PDF / IMAGE) ---
            const convertPdfToImage = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.5 });
                const canvas = document.createElement("canvas");
                const context = canvas.getContext("2d");
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                return canvas.toDataURL("image/png");
            };

            const scanTicket = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setReceiptItems([]);

                try {
                    let source = file;
                    if (file.type === "application/pdf") source = await convertPdfToImage(file);

                    const worker = await Tesseract.createWorker("fra");
                    await worker.setParameters({ preserve_interword_spaces: "1" });
                    const { data: { text } } = await worker.recognize(source);
                    const lText = text.toUpperCase();

                    // Détection magasin
                    if (lText.includes("LECLERC")) setMagasinInfo({ nom: "E.Leclerc", color: "orange" });
                    else if (lText.includes("HYPER U") || lText.includes("VENTE")) setMagasinInfo({ nom: "Hyper U", color: "red" });

                    const lignes = text.split("\n");
                    const res = [];
                    let stopLecture = false;

                    const nettoyerNom = (nom) => {
                        const firstDigit = nom.search(/\d/);
                        let propre = firstDigit !== -1 ? nom.substring(0, firstDigit) : nom;
                        propre = propre.replace(/[*_]/g, "").trim();
                        while (propre.endsWith(".") || propre.endsWith(",")) propre = propre.slice(0, -1).trim();
                        return propre;
                    };

                    lignes.forEach((ligne, index) => {
                        if (stopLecture) return;
                        let l = ligne.trim().toUpperCase();
                        if (l.length < 3) return;
                        if (l.includes("TOTAL") || l.includes("RESTE A PAYER") || l.includes("NOMBRE DE LIGNES")) { stopLecture = true; return; }

                        const regexPrixFin = /(\d+[\.,]\d{2})\s*(?:€|EUR|E)?$/;
                        const matchPrix = l.match(regexPrixFin);
                        const regexMulti = /^(\d+)\s*[X*x]\s*[\d,.]+/;
                        const regexPesee = /KG\s*[X*x]\s*[\d,.]+/;
                        const matchCalcul = l.match(regexMulti) || l.match(regexPesee);

                        if (matchCalcul) {
                            const qte = l.match(regexMulti) ? parseInt(l.match(regexMulti)[1]) : 1;
                            for (let i = 1; i <= 4; i++) {
                                let nomCandidat = lignes[index - i] ? lignes[index - i].trim().toUpperCase() : "";
                                if (nomCandidat.length > 2 && !nomCandidat.includes("PESÉE") && !nomCandidat.match(regexPrixFin)) {
                                    const nomFinal = nettoyerNom(nomCandidat);
                                    if (nomFinal.length > 2) {
                                        const idx = res.findIndex((p) => p.nom === nomFinal);
                                        if (idx !== -1) res[idx].qte = qte;
                                        else res.push({ nom: nomFinal, qte: qte, dlc: '', congele: false });
                                        break;
                                    }
                                }
                            }
                        } else if (matchPrix) {
                            let nomBrut = l.replace(regexPrixFin, "").trim();
                            const nomFinal = nettoyerNom(nomBrut);
                            if (nomFinal.length > 2 && !res.some((p) => p.nom === nomFinal)) {
                                res.push({ nom: nomFinal, qte: 1, dlc: '', congele: false });
                            }
                        }
                    });

                    setReceiptItems(res);
                    await worker.terminate();
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            const saveReceiptToStock = async () => {
                setLoading(true);
                for (const item of receiptItems) {
                    // On cherche si le produit existe déjà pour garder le rayon
                    const existant = produits.find(p => p.nom.toUpperCase() === item.nom.toUpperCase());
                    const nouveau = {
                        id: Date.now() + Math.random(),
                        nom: item.nom,
                        zone: existant ? existant.zone : 'Alimentaire',
                        rayon: existant ? existant.rayon : 'Autres',
                        typeStock: 'unite',
                        stock: item.qte,
                        date: item.dlc,
                        congele: item.congele ? 1 : 0,
                        checked: 0
                    };
                    await syncWithServer(nouveau);
                }
                // Recharger le stock
                window.location.reload();
            };

            // --- UI HELPERS ---
            const checkDLC = (dateStr, congele) => {
                if (!dateStr || congele) return { status: 'ok', msg: '' };
                const diff = (new Date(dateStr) - new Date()) / (1000 * 60 * 60 * 24);
                if (diff < 0) return { status: 'expired', msg: 'PÉRIMÉ' };
                if (diff <= 3) return { status: 'warning', msg: 'DLC PROCHE' };
                return { status: 'ok', msg: '' };
            };

            const formatDateFR = (dateUS) => {
                if (!dateUS) return '';
                const parts = dateUS.split('-');
                return parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : dateUS;
            };

            const updateStock = (id, delta) => {
                const nouveauxProduits = produits.map(p => {
                    if (p.id !== id) return p;
                    let next = p.typeStock === 'pourcent' ? Number(p.stock) + (delta * 25) : Number(p.stock) + delta;
                    if (next <= 0) { 
                        if(confirm(`Ajouter ${p.nom} à la liste de courses ?`)) {
                            const up = {...p, stock: 0, checked: 0}; syncWithServer(up); return up;
                        } else {
                            fetch(`${API_URL}?action=delete_product&id=${p.id}&user=${currentUser}`);
                            return null;
                        }
                    }
                    const updated = { ...p, stock: Math.max(0, p.typeStock === 'pourcent' ? Math.min(100, next) : next) };
                    syncWithServer(updated); return updated;
                }).filter(p => p !== null);
                setProduits(nouveauxProduits);
            };

            if (!isLoggedIn) return <Login onLogin={handleLoginSuccess} />;

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-32">
                    {/* HEADER */}
                    <header className="bg-white p-5 sticky top-0 z-30 border-b shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="font-black italic text-lg uppercase text-green-600 underline">MON STOCKAGE</h1>
                            <div className="flex gap-2">
                                <button onClick={() => setView('receipt')} className="bg-blue-600 text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase">🧾 Ticket</button>
                                <button onClick={() => setView(view === 'home' ? 'shopping' : 'home')} className="bg-black text-white px-3 py-2 rounded-xl text-[9px] font-bold uppercase">
                                    {view === 'home' ? 'Courses' : 'Stock'}
                                </button>
                            </div>
                        </div>
                        {view === 'home' && (
                            <input type="text" placeholder="🔍 Rechercher..." className="w-full px-4 py-3 bg-gray-100 rounded-2xl text-sm outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        )}
                    </header>

                    <main className="p-4">
                        {/* VUE TICKET DE CAISSE */}
                        {view === 'receipt' && (
                            <div className="animate-up space-y-6">
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 text-center">
                                    <h2 className="font-black uppercase text-xs mb-4 text-gray-400">Scanner un ticket de caisse</h2>
                                    <input type="file" accept="image/*,application/pdf" onChange={scanTicket} id="receipt-upload" className="hidden" />
                                    <label htmlFor="receipt-upload" className="inline-block bg-blue-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-xs cursor-pointer shadow-lg active:scale-95 transition-all">
                                        📷 Sélectionner Photo / PDF
                                    </label>
                                    {loading && <p className="mt-4 text-[10px] font-black text-blue-500 animate-pulse uppercase">Analyse en cours...</p>}
                                </div>

                                {receiptItems.length > 0 && (
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center px-2">
                                            <span className="text-[10px] font-black uppercase text-gray-400">Articles trouvés ({receiptItems.length})</span>
                                            <span className="text-[10px] font-black text-blue-600">{magasinInfo.nom}</span>
                                        </div>
                                        {receiptItems.map((item, idx) => (
                                            <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                                                <div className="flex justify-between items-start">
                                                    <span className="font-bold text-xs uppercase text-gray-700 leading-tight w-2/3">{item.nom}</span>
                                                    <span className="bg-gray-100 px-2 py-1 rounded-lg font-black text-[10px]">x{item.qte}</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <input type="date" className="flex-1 p-2 bg-gray-50 rounded-xl text-[10px] font-bold outline-none border border-gray-100" 
                                                        onChange={(e) => {
                                                            const newItems = [...receiptItems];
                                                            newItems[idx].dlc = e.target.value;
                                                            setReceiptItems(newItems);
                                                        }} />
                                                    <button 
                                                        onClick={() => {
                                                            const newItems = [...receiptItems];
                                                            newItems[idx].congele = !newItems[idx].congele;
                                                            setReceiptItems(newItems);
                                                        }}
                                                        className={`p-2 rounded-xl text-lg ${item.congele ? 'bg-blue-500' : 'bg-gray-100'}`}>❄️</button>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={saveReceiptToStock} className="w-full bg-green-600 text-white p-5 rounded-[2rem] font-black uppercase shadow-xl tracking-widest text-sm">
                                            🚀 Ajouter tout au stock
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VUE STOCK (HOME) */}
                        {view === 'home' && (
                            <div className="space-y-4">
                                {Object.keys(STRUCTURE).map(zone => {
                                    const zoneItems = produits.filter(p => p.zone === zone && Number(p.stock) > 0 && p.nom.toLowerCase().includes(searchTerm.toLowerCase()));
                                    if (zoneItems.length === 0) return null;
                                    return (
                                        <div key={zone}>
                                            <h3 className="p-4 font-black text-xs uppercase italic text-gray-400 tracking-wider">{STRUCTURE[zone].icon} {zone}</h3>
                                            {STRUCTURE[zone].rayons.map(ray => {
                                                const rayItems = zoneItems.filter(p => p.rayon === ray.id);
                                                if (rayItems.length === 0) return null;
                                                return (
                                                    <div key={ray.id} className="mb-4 bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden">
                                                        <div className="p-3 px-5 bg-gray-50/50 border-b border-gray-100 text-[10px] font-black text-gray-400 uppercase flex justify-between">
                                                            <span>{ray.icon} {ray.id}</span>
                                                            <span>{rayItems.length}</span>
                                                        </div>
                                                        <div className="divide-y divide-gray-50">
                                                            {rayItems.map(p => (
                                                                <div key={p.id} className="p-4 flex justify-between items-center">
                                                                    <div>
                                                                        <p className="font-bold text-sm text-gray-800">{p.nom}</p>
                                                                        <div className="flex items-center gap-2">
                                                                            <span className="text-[9px] text-gray-400 italic">{p.date ? formatDateFR(p.date) : 'Sans DLC'}</span>
                                                                            {p.congele == 1 && <span className="text-[9px]">❄️</span>}
                                                                        </div>
                                                                    </div>
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="text-[10px] font-black bg-gray-100 px-2 py-1 rounded-lg">
                                                                            {p.typeStock === 'pourcent' ? p.stock+'%' : 'Qté: '+p.stock}
                                                                        </span>
                                                                        <div className="flex gap-1">
                                                                            <button onClick={() => updateStock(p.id, -1)} className="w-8 h-8 bg-gray-50 rounded-lg font-bold border border-gray-100 shadow-sm">-</button>
                                                                            <button onClick={() => updateStock(p.id, 1)} className="w-8 h-8 bg-gray-50 rounded-lg font-bold border border-gray-100 shadow-sm">+</button>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* VUE COURSES (SHOPPING) */}
                        {view === 'shopping' && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-[2rem] border border-gray-100 shadow-sm divide-y divide-gray-50 overflow-hidden">
                                    {produits.filter(p => Number(p.stock) === 0).length === 0 ? 
                                        <p className="p-12 text-center text-gray-300 italic text-sm">Liste vide</p> :
                                        produits.filter(p => Number(p.stock) === 0).map(p => (
                                            <div key={p.id} className="flex items-center justify-between p-4 bg-white">
                                                <div className="flex items-center gap-4">
                                                    <input type="checkbox" className="w-6 h-6 accent-green-600 rounded-lg shadow-sm" />
                                                    <div>
                                                        <p className="font-bold text-sm text-gray-700">{p.nom}</p>
                                                        <p className="text-[8px] text-gray-400 font-black uppercase">{p.rayon}</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => {
                                                    fetch(`${API_URL}?action=delete_product&id=${p.id}`);
                                                    setProduits(produits.filter(i => i.id !== p.id));
                                                }} className="text-gray-200 p-2">✕</button>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODALE AJOUT MANUEL */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end z-50 p-4">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 max-w-sm mx-auto animate-up">
                                <h2 className="text-center font-black mb-6 uppercase text-gray-300 text-[10px]">Nouvel Article</h2>
                                <input type="text" placeholder="Nom..." className="w-full p-4 bg-gray-50 rounded-2xl mb-4 border-none outline-none font-bold" value={form.nom} onChange={e => setForm({...form, nom: e.target.value})} />
                                <div className="grid grid-cols-2 gap-2 mb-4">
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[10px] font-bold" value={form.zone} onChange={e => setForm({...form, zone: e.target.value, rayon: STRUCTURE[e.target.value].rayons[0].id})}>
                                        {Object.keys(STRUCTURE).map(z => <option key={z} value={z}>{z}</option>)}
                                    </select>
                                    <select className="p-3 bg-white border border-gray-100 rounded-xl text-[10px] font-bold" value={form.rayon} onChange={e => setForm({...form, rayon: e.target.value})}>
                                        {STRUCTURE[form.zone].rayons.map(r => <option key={r.id} value={r.id}>{r.id}</option>)}
                                    </select>
                                </div>
                                <div className="grid grid-cols-2 gap-2 mb-6">
                                    <input type="date" className="p-3 bg-white border border-gray-100 rounded-xl text-[10px] font-bold" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                                    <input type="number" placeholder="Qté" className="p-3 bg-white border border-gray-100 rounded-xl text-[10px] font-bold" value={form.stock} onChange={e => setForm({...form, stock: Number(e.target.value)})} />
                                </div>
                                <button onClick={() => {
                                    const nouveau = {...form, id: Date.now(), congele: form.congele ? 1 : 0, checked: 0};
                                    setProduits([nouveau, ...produits]); syncWithServer(nouveau); setShowAddModal(false);
                                }} className="w-full bg-green-600 text-white p-5 rounded-[2rem] font-black uppercase shadow-xl text-sm transition-all active:scale-95">Enregistrer</button>
                                <button onClick={() => setShowAddModal(false)} className="w-full text-gray-300 text-[10px] font-black uppercase text-center mt-4">Annuler</button>
                            </div>
                        </div>
                    )}

                    {/* BARRE DE NAVIGATION */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 backdrop-blur-md border border-gray-100 p-2 rounded-[2.5rem] flex justify-around items-center shadow-2xl z-40">
                        <button onClick={() => setView('home')} className={`p-4 transition-all ${view === 'home' ? 'text-green-600 scale-125' : 'text-gray-200'}`}>🏠</button>
                        <button onClick={() => setShowAddModal(true)} className="bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-xl active:scale-75 transition-all">＋</button>
                        <button onClick={() => setView('shopping')} className={`p-4 transition-all ${view === 'shopping' ? 'text-green-600 scale-125' : 'text-gray-200'}`}>🛒</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
